l_russian:
#STP
 STP_hedonism_with_no_bondaries: "Политика гедонизма без границ"
 STP_hedonism_with_no_bondaries_desc: "Государство перестало притворяться воспитателем и стало продавцом удовольствий. Границы открыты для капитала, пороков и туристов, а мораль заменена прайс-листом.\n\nПока витрины сияют, система учится одному: держать людей сытыми, занятыми и слегка одурманенными. Это работает — до тех пор, пока праздник не кончается и счет не приносят всем сразу."
 STP_hidden_slaves_trade: "Широкая сеть работорговли"
 STP_hidden_slaves_trade_desc: "За фасадом «свободного рынка» работает рынок несвободных людей. Трафик идет тихо: через порты, склады, агентства, «контракты» и исчезающие имена.\n\nОфициально этого не существует. Неофициально — это один из самых эффективных каналов прибыли и контроля. В этом бизнесе товар не жалуется, потому что у товара нет голоса."
 STP_legalize: "Легалайз лёгких наркотиков"
 STP_legalize_desc: "Проблему недовольства решили не реформой, а обезболивающим. Лёгкие вещества стали легальными, рынок — регулируемым, бюджет — пополненным.\n\nТолпа стала тише, улицы — ярче, отчеты — красивее. Побочный эффект очевиден: общество учится не думать о будущем, а пережидать настоящее."
 STP_worldwide_famous_tourist_destination: "Экономическое чудо Стеланда"
 STP_worldwide_famous_tourist_destination_desc: "Стеланд превратили в бренд: курорт, витрину и легенду. Валюта течет рекой, сервис улыбается безупречно, а любая грязь вытирается до того, как попадет в кадр.\n\nЧудо держится на впечатлении. Пока турист видит фейерверк, он не спрашивает, кто таскал порох и кто выметал пепел."
#VAL
 VAL_mercenary_state: "Государство наёмников"
 VAL_mercenary_state_desc: "Здесь верность измеряется не клятвой, а ставкой. Государство перестроило себя под контракт: быстрый набор, жесткая дисциплина, холодная эффективность.\n\nИдеология проста: кто платит — тот и прав. Но чем больше страна зарабатывает на войне, тем меньше она помнит, ради чего вообще стоит жить."
 VAL_worldwide_famous_weponry: "Всемиро известные оружейные фабрики"
 VAL_worldwide_famous_weponry_desc: "Заводы здесь — как соборы: шумные, горячие, священные. На конвейере рождается сталь, которая через месяц будет говорить вместо дипломатии.\n\nРепутация безупречна: точность, надежность, масштаб. Цена тоже безупречна — ее всегда платят чужой кровью."
 VAL_harvest_of_ash: " Урожай пепла"
 VAL_harvest_of_ash_desc: "Земля здесь проклята. Она больше не рождает жизнь, только колючую проволоку и сухие ветви, тянущиеся к небу, как костлявые руки мертвецов. Крестьяне собирают урожай из неразорвавшихся снарядов и костей предков. Здесь голод — не гость, а постоянный хозяин, и даже солнце на закате кажется болезненно-кровавым. \n\n\n\n\n\n\n £GFX_VAL_harvest_of_ash_banner \n\n\n"
 #WRK
 WRK_ashes_of_the_crown: "Пепел короны"
 WRK_ashes_of_the_crown_desc: "Старый порядок сгорел не красиво, а буднично — в бумагах, приказах и страхе. Корона стала пеплом, а вместе с ней — привычная система лояльностей.\n\nНам достались руины символов и толпа, которая помнит величие, но не помнит, как за него платить. Вакуум власти пахнет гарью: кто первым вдохнет — тот и начнет диктовать новую эпоху."
 WRK_hourglass_of_discord: "Песочные часы раздора"
 WRK_hourglass_of_discord_desc: "Песок в часах почти иссяк. Каждый удар маятника приближает нас к неизбежному финалу. Старые институты рушатся, экономика в агонии, а на улицах шепчутся о скором конце света. Мы не строим планы на пятилетки, мы пытаемся пережить следующий день. Это гонка со смертью, и смерть пока выигрывает. \n\n Слышишь этот звук? Это не биение сердца, это тиканье механизма, отсчитывающего последние минуты нашей эпохи. Песок в часах почти иссяк, и он раскален докрасна. Мы работаем не ради будущего — будущего нет. Мы работаем, чтобы пережить этот вечер. Каждая секунда промедления оплачивается сотнями жизней."
 WRK_constitution_of_the_republic: "Конституция республики"
 WRK_constitution_of_the_republic_desc: "Новая конституция — это попытка превратить хаос в процедуру. Прописать правила там, где вчера решали силой, и выдать стране хотя бы одну общую линию на карте смыслов.\n\nДокумент выглядит как спасение, но бумага не удерживает трещины сама по себе. Если республика не научится подчиняться собственным статьям, конституция станет не фундаментом, а надгробной плитой надежд."
 #NOD
 NOD_home_of_hedonist_revolution: "Родина гедонистической революции"
 NOD_home_of_hedonist_revolution_desc: "Это место больше не страна — это манифест, упакованный в неон и дорогие ткани.\n\nЗдесь революцию не объявляли на площадях — её продали в виде образа жизни. Свобода стала товаром, удовольствие — гражданской обязанностью, а идеология — рекламным слоганом. Любой, кто сомневается, объявляется не врагом, а просто «скучным».\n\nСнаружи всё выглядит как триумф: вечеринки, витрины, туризм, деньги, льющиеся без остановки. Внутри же система держится на циничной сделке: государство гарантирует праздник, а народ не задаёт вопросов — ни о цене, ни о тех, кто исчезает за кулисами.\n\nИ пока играет музыка, партия улыбается миру. Но у каждой улыбки есть мышца, которая устаёт. Когда же свет погаснет, выяснится, что у революции удовольствия есть одна вечная проблема: она не умеет умирать тихо."

 # Law categories
 social_laws: "Общественные законы"
 social_laws_desc: "Правила, по которым государство удерживает общественный порядок и управляет публичной жизнью."
 economic_laws: "Экономические законы"
 economic_laws_desc: "Законы, задающие экономическую модель, торговлю и фискальную нагрузку."
 army_laws: "Военные законы"
 army_laws_desc: "Законы, определяющие мобилизацию и устройство вооружённых сил."
 ADISCORD_civic_order_laws: "Общественный порядок"
 ADISCORD_civic_order_laws_desc: "Как государство связывает граждан, общины и административный центр."
 ADISCORD_information_laws: "Информационная политика"
 ADISCORD_information_laws_desc: "Как государство обращается с прессой, слухами и публичной повесткой."
 ADISCORD_taxation_laws: "Налоговая модель"
 ADISCORD_taxation_laws_desc: "Как государство собирает ресурсы, не обрушивая хозяйство."
 ADISCORD_military_organization_laws: "Военная организация"
 ADISCORD_military_organization_laws_desc: "Как армия устроена между местной инициативой, контрактом и штабной вертикалью."

 ADISCORD_civic_order_loose_communes: "Свободные коммуны"
 ADISCORD_civic_order_loose_communes_desc: "Центр почти не вмешивается в жизнь общин. Люди охотнее принимают решения сами, но такая свобода плохо держит страну в кризис."
 ADISCORD_civic_order_local_councils: "Местные советы"
 ADISCORD_civic_order_local_councils_desc: "Часть власти передана на места. Это снижает трение между столицей и регионами, но требует времени на согласования."
 ADISCORD_civic_order_central_registers: "Центральные реестры"
 ADISCORD_civic_order_central_registers_desc: "Государство знает, где находятся люди, ресурсы и обязательства. Система не изящна, зато понятна чиновникам."
 ADISCORD_civic_order_emergency_committees: "Чрезвычайные комитеты"
 ADISCORD_civic_order_emergency_committees_desc: "В мирное время они выглядят лишними, в тревожное - незаменимыми. Комитеты ускоряют мобилизацию ценой нервного общества."
 ADISCORD_civic_order_internal_directorate: "Внутренний директорат"
 ADISCORD_civic_order_internal_directorate_desc: "Единая вертикаль надзора давит на оппозицию и слухи. Порядок становится крепче, но страна платит за него деньгами и доверием."

 ADISCORD_information_open_press: "Открытая пресса"
 ADISCORD_information_open_press_desc: "Печать спорит, расследует и ошибается вслух. Идей становится больше, но управлять настроениями сложнее."
 ADISCORD_information_licensed_press: "Лицензированная пресса"
 ADISCORD_information_licensed_press_desc: "Газеты и каналы работают свободно, пока помнят границы дозволенного. Удобный компромисс между контролем и живой публичностью."
 ADISCORD_information_state_bulletins: "Государственные сводки"
 ADISCORD_information_state_bulletins_desc: "Главные новости приходят из официальных бюро. Повестка становится ровнее, но независимая мысль постепенно беднеет."
 ADISCORD_information_wartime_censorship: "Военная цензура"
 ADISCORD_information_wartime_censorship_desc: "Плохие вести проходят через сито штаба. Это помогает фронту и тылу держаться вместе, пока цена молчания не стала слишком высокой."
 ADISCORD_information_sealed_networks: "Запечатанные сети"
 ADISCORD_information_sealed_networks_desc: "Связь, печать и публичные площадки собраны под жёстким надзором. Страна меньше спорит, но и хуже дышит."

 ADISCORD_taxation_light_dues: "Лёгкие сборы"
 ADISCORD_taxation_light_dues_desc: "Государство берёт немного и надеется, что экономика вырастет сама. Производители довольны, казна - не всегда."
 ADISCORD_taxation_balanced_register: "Сбалансированный реестр"
 ADISCORD_taxation_balanced_register_desc: "Ставки умеренные, льготы понятные, сборы предсказуемые. Это не вдохновляет, зато редко рушится."
 ADISCORD_taxation_progressive_brackets: "Прогрессивные шкалы"
 ADISCORD_taxation_progressive_brackets_desc: "Богатые платят больше, бедные получают передышку. Общество спокойнее, но бизнесу приходится держать лишний резерв."
 ADISCORD_taxation_industrial_tariffs: "Промышленные тарифы"
 ADISCORD_taxation_industrial_tariffs_desc: "Пошлины и льготы подталкивают заводы к нужным отраслям. Рост получается направленным, но не самым гибким."
 ADISCORD_taxation_extraction_quotas: "Изъятие по квотам"
 ADISCORD_taxation_extraction_quotas_desc: "Государство забирает ресурсы приказом, а не просьбой. Заводы получают топливо для рывка, общество - повод злиться."

 ADISCORD_military_organization_militia_autonomy: "Автономные ополчения"
 ADISCORD_military_organization_militia_autonomy_desc: "Местные отряды быстро собираются и знают свою землю. В единой линии фронта они держатся хуже регулярных частей."
 ADISCORD_military_organization_cadre_army: "Кадровая армия"
 ADISCORD_military_organization_cadre_army_desc: "Небольшое профессиональное ядро поддерживает порядок, обучает резерв и не перегружает общество."
 ADISCORD_military_organization_contract_brigades: "Контрактные бригады"
 ADISCORD_military_organization_contract_brigades_desc: "Служба превращена в сделку: меньше романтики, больше дисциплины. Хорошие бригады требуют хорошей оплаты."
 ADISCORD_military_organization_general_staff: "Штабная вертикаль"
 ADISCORD_military_organization_general_staff_desc: "Генеральный штаб связывает планы, резервы и снабжение в одну схему. Решения становятся тяжелее, но точнее."
 ADISCORD_military_organization_total_defense_grid: "Сеть тотальной обороны"
 ADISCORD_military_organization_total_defense_grid_desc: "Страна заранее размечена под оборону, мобилизацию и узлы сопротивления. Это помогает выстоять, но мешает нормальной мирной работе."

 vacant: "Вакантно"
 vacant_desc: "Должность пока не занята."

 ADISCORD_welfare_laws: "Социальная защита"
 ADISCORD_welfare_laws_desc: "Базовые правила помощи населению, пособий и защиты уязвимых групп."
 ADISCORD_education_laws: "Образование"
 ADISCORD_education_laws_desc: "Как государство поддерживает школы, университеты и подготовку специалистов."
 ADISCORD_healthcare_laws: "Здравоохранение"
 ADISCORD_healthcare_laws_desc: "Как устроены больницы, клиники и доступ населения к медицине."
 ADISCORD_cultural_policy_laws: "Культурная политика"
 ADISCORD_cultural_policy_laws_desc: "Как государство работает с массовой культурой, нормами и публичной моралью."
 ADISCORD_industrial_policy_laws: "Промышленная политика"
 ADISCORD_industrial_policy_laws_desc: "Как государство направляет заводы, мастерские и производственные цепочки."
 ADISCORD_labor_policy_laws: "Трудовая политика"
 ADISCORD_labor_policy_laws_desc: "Как регулируются рабочие контракты, занятость и трудовая дисциплина."
 ADISCORD_infrastructure_laws: "Инфраструктура"
 ADISCORD_infrastructure_laws_desc: "Как страна строит и обслуживает дороги, склады, порты и коммуникации."
 ADISCORD_officer_corps_laws: "Офицерский корпус"
 ADISCORD_officer_corps_laws_desc: "Как армия отбирает, продвигает и удерживает командиров."
 ADISCORD_logistics_laws: "Военная логистика"
 ADISCORD_logistics_laws_desc: "Как армия снабжает части, склады и фронтовые маршруты."
 ADISCORD_training_laws: "Военная подготовка"
 ADISCORD_training_laws_desc: "Как организованы обучение, сборы, нормативы и полевая подготовка."
 ADISCORD_internal_security_laws: "Внутренняя безопасность"
 ADISCORD_internal_security_laws_desc: "Как государство использует гарнизоны, полицию и службы порядка внутри страны."

 ADISCORD_welfare_basic_services: "Базовые службы помощи"
 ADISCORD_welfare_basic_services_desc: "Небольшая сеть пособий, приютов и социальных служб помогает удерживать общество от срыва."
 ADISCORD_education_basic_schools: "Базовые школы"
 ADISCORD_education_basic_schools_desc: "Школы работают неравномерно, но государство сохраняет минимальную систему грамотности и подготовки кадров."
 ADISCORD_healthcare_basic_clinics: "Базовые клиники"
 ADISCORD_healthcare_basic_clinics_desc: "Первичная медицина доступна не всем и не всегда, но у страны есть каркас здравоохранения."
 ADISCORD_cultural_policy_public_entertainment: "Публичные развлечения"
 ADISCORD_cultural_policy_public_entertainment_desc: "Государство разрешает массовую культуру и зрелища как простой способ держать общество спокойным."
 ADISCORD_industrial_policy_balanced_workshops: "Сбалансированные мастерские"
 ADISCORD_industrial_policy_balanced_workshops_desc: "Промышленная политика осторожна: государство поддерживает производство, не ломая рынок чрезмерным нажимом."
 ADISCORD_labor_policy_loose_contracts: "Свободные контракты"
 ADISCORD_labor_policy_loose_contracts_desc: "Работодатели и работники договариваются гибко, но слабая защита труда иногда бьёт по стабильности."
 ADISCORD_infrastructure_patchwork_roads: "Лоскутные дороги"
 ADISCORD_infrastructure_patchwork_roads_desc: "Инфраструктура ремонтируется по необходимости: без большого плана, зато быстро и дешево."
 ADISCORD_officer_corps_local_seniority: "Местная выслуга"
 ADISCORD_officer_corps_local_seniority_desc: "Командиры растут из привычных кругов и старых частей. Система понятна армии, пусть и не всегда эффективна."
 ADISCORD_logistics_civilian_contracts: "Гражданские контракты"
 ADISCORD_logistics_civilian_contracts_desc: "Армия частично опирается на гражданских поставщиков, склады и перевозчиков."
 ADISCORD_training_basic_drills: "Базовая муштра"
 ADISCORD_training_basic_drills_desc: "Солдаты получают минимально достаточную подготовку, чтобы армия могла держать строй."
 ADISCORD_internal_security_local_garrisons: "Местные гарнизоны"
 ADISCORD_internal_security_local_garrisons_desc: "Гарнизоны помогают держать порядок внутри страны, но отвлекают часть армейской энергии от фронтовой подготовки."

 # Новые сбалансированные законы
 ADISCORD_welfare_charity_relief: "Благотворительная помощь"
 ADISCORD_welfare_charity_relief_desc: "Государство почти не строит систему защиты, а опирается на фонды, общины и частную милость. Это дешево для бюджета, но плохо работает как настоящая страховка от бедности."
 ADISCORD_welfare_social_insurance: "Социальное страхование"
 ADISCORD_welfare_social_insurance_desc: "Пособия и выплаты привязаны к труду, взносам и понятным правилам. Общество чувствует себя увереннее, хотя такая машина требует денег и администрирования."
 ADISCORD_welfare_universal_provision: "Всеобщее обеспечение"
 ADISCORD_welfare_universal_provision_desc: "Государство берет на себя широкие обязательства перед населением. Люди живут спокойнее и дольше, но казна и чиновники начинают работать на пределе."
 ADISCORD_welfare_rationed_support: "Нормированная поддержка"
 ADISCORD_welfare_rationed_support_desc: "Помощь выдается по спискам, нормам и очередям. В кризис это позволяет экономить ресурсы и держать фронт, но мирное общество быстро устает от талонов."
 ADISCORD_education_informal_instruction: "Неформальное обучение"
 ADISCORD_education_informal_instruction_desc: "Знания передаются через семьи, мастерские, наставников и случайные школы. Система почти ничего не стоит, но дает стране слишком неровный кадровый фундамент."
 ADISCORD_education_civic_curriculum: "Гражданская программа"
 ADISCORD_education_civic_curriculum_desc: "Школы учат не только грамоте, но и общей политической рамке. Это укрепляет лояльность и порядок, хотя учебная система становится менее свободной."
 ADISCORD_education_technical_institutes: "Технические институты"
 ADISCORD_education_technical_institutes_desc: "Государство делает ставку на инженеров, мастеров и прикладные науки. Заводы получают нужные кадры, но образование становится более жестким и утилитарным."
 ADISCORD_education_elite_academies: "Элитные академии"
 ADISCORD_education_elite_academies_desc: "Лучшие школы и академии готовят управленцев, штабистов и исследователей для верхних этажей системы. Результат силен, но доступ к нему получают не все."
 ADISCORD_healthcare_private_care: "Частная медицина"
 ADISCORD_healthcare_private_care_desc: "Лечение в основном остается делом рынка, семей и местных врачей. Бюджет экономит средства, но здоровье населения слишком зависит от кошелька и удачи."
 ADISCORD_healthcare_public_hospitals: "Государственные больницы"
 ADISCORD_healthcare_public_hospitals_desc: "Сеть больниц дает населению более надежный доступ к медицине. Система повышает устойчивость общества, но требует постоянного финансирования."
 ADISCORD_healthcare_preventive_medicine: "Профилактическая медицина"
 ADISCORD_healthcare_preventive_medicine_desc: "Врачи, статистики и санитарные службы пытаются предотвращать болезни заранее. Это дорого и бюрократично, зато страна меньше теряет людей впустую."
 ADISCORD_healthcare_military_medical_service: "Военно-медицинская служба"
 ADISCORD_healthcare_military_medical_service_desc: "Медицина перестраивается под нужды армии, тыла и раненых. В войну это спасает боеспособность, но мирные клиники получают меньше внимания."
 ADISCORD_cultural_policy_tolerated_subcultures: "Терпимые субкультуры"
 ADISCORD_cultural_policy_tolerated_subcultures_desc: "Государство позволяет разным группам жить и говорить почти открыто. Общество становится живее и умнее, но единая повестка слабее держит массу."
 ADISCORD_cultural_policy_civic_festivals: "Гражданские фестивали"
 ADISCORD_cultural_policy_civic_festivals_desc: "Праздники, церемонии и городские события превращают лояльность в привычку. Людям дают символы, музыку и повод не спорить хотя бы один день."
 ADISCORD_cultural_policy_avant_garde_patronage: "Покровительство авангарду"
 ADISCORD_cultural_policy_avant_garde_patronage_desc: "Страна финансирует спорное искусство, лаборатории культуры и новые формы выражения. Это будит идеи, но раздражает тех, кто хочет простых ответов."
 ADISCORD_cultural_policy_national_mythmaking: "Национальное мифотворчество"
 ADISCORD_cultural_policy_national_mythmaking_desc: "Культура собирается вокруг героев, жертв и великого предназначения. Такая история хорошо держит строй, но плохо терпит сомнения."
 ADISCORD_industrial_policy_artisan_markets: "Ремесленные рынки"
 ADISCORD_industrial_policy_artisan_markets_desc: "Малые мастерские и частные производители получают пространство для выживания. Товары идут населению, но крупный промышленный рывок из этого выходит редко."
 ADISCORD_industrial_policy_civilian_expansion: "Гражданское расширение"
 ADISCORD_industrial_policy_civilian_expansion_desc: "Промышленность направлена на жилье, фабрики и мирное производство. Экономика растет шире, но военные заводы не получают абсолютного приоритета."
 ADISCORD_industrial_policy_military_prioritization: "Военный приоритет"
 ADISCORD_industrial_policy_military_prioritization_desc: "Станки, сырье и рабочие руки уходят прежде всего в оборонку. Армия получает больше, гражданский сектор терпит и считает издержки."
 ADISCORD_industrial_policy_state_planning_boards: "Плановые комитеты"
 ADISCORD_industrial_policy_state_planning_boards_desc: "Производственные цепочки сводятся в единую государственную схему. Заводы работают согласованнее, но рынок теряет гибкость, а чиновники получают слишком много веса."
 ADISCORD_labor_policy_guild_protections: "Цеховая защита"
 ADISCORD_labor_policy_guild_protections_desc: "Профессии, артели и старые трудовые круги получают защиту от дикого рынка. Рабочие спокойнее, но экономика становится менее резкой и менее гибкой."
 ADISCORD_labor_policy_regulated_shifts: "Регулируемые смены"
 ADISCORD_labor_policy_regulated_shifts_desc: "Государство ограничивает рабочий день, нормы и условия труда. Стабильность на предприятиях растет, но производство платит за это темпом."
 ADISCORD_labor_policy_technocratic_work_norms: "Технократические нормы труда"
 ADISCORD_labor_policy_technocratic_work_norms_desc: "Работу измеряют таблицами, стандартами и рационализацией. Заводы становятся эффективнее, но человек все чаще выглядит как строка в производственном плане."
 ADISCORD_labor_policy_mobilized_labor: "Мобилизованный труд"
 ADISCORD_labor_policy_mobilized_labor_desc: "Рабочая сила распределяется приказом туда, где она нужна государству. В чрезвычайных условиях это дает рывок, но общество быстро запоминает цену принуждения."
 ADISCORD_infrastructure_regional_roadworks: "Региональные дорожные работы"
 ADISCORD_infrastructure_regional_roadworks_desc: "Дороги строятся через региональные программы и местные подрядные сети. Это медленнее большого рывка, зато страна постепенно связывается в единую карту."
 ADISCORD_infrastructure_rail_corridors: "Железнодорожные коридоры"
 ADISCORD_infrastructure_rail_corridors_desc: "Приоритет отдан магистралям, узлам и перевозкам между ключевыми центрами. Снабжение становится надежнее, но такая сеть требует тяжелых вложений."
 ADISCORD_infrastructure_strategic_highways: "Стратегические шоссе"
 ADISCORD_infrastructure_strategic_highways_desc: "Трассы проектируются с расчетом на переброску войск, грузов и резервов. Мобилизация ускоряется, но мирная инфраструктура подчиняется военной логике."
 ADISCORD_infrastructure_military_depots: "Военные склады"
 ADISCORD_infrastructure_military_depots_desc: "Страна заранее наполняет узлы снабжения оружием, топливом и пайками. Фронт благодарит, гражданская экономика спрашивает, почему ей снова не хватило ресурсов."
 ADISCORD_officer_corps_merit_commissions: "Комиссии по заслугам"
 ADISCORD_officer_corps_merit_commissions_desc: "Продвижение офицеров проходит через оценки, экзамены и боевую пригодность. Армия получает более сильных командиров, но старые круги теряют комфорт."
 ADISCORD_officer_corps_political_commissars: "Политические комиссары"
 ADISCORD_officer_corps_political_commissars_desc: "Над командирами ставят людей, отвечающих за линию, настроение и надежность частей. Лояльность растет, но чистая военная эффективность страдает."
 ADISCORD_officer_corps_general_staff_academy: "Академия Генштаба"
 ADISCORD_officer_corps_general_staff_academy_desc: "Высшее командование учится планировать кампании, снабжение и взаимодействие родов войск. Решения становятся грамотнее, но подготовка такой элиты стоит дорого."
 ADISCORD_officer_corps_emergency_promotions: "Чрезвычайные повышения"
 ADISCORD_officer_corps_emergency_promotions_desc: "Война быстро вытаскивает наверх смелых, жестких и просто выживших. Командиров становится больше, но качество таких назначений не всегда выдерживает проверку."
 ADISCORD_logistics_local_foraging: "Местное фуражирование"
 ADISCORD_logistics_local_foraging_desc: "Части кормятся и снабжаются за счет ближайших территорий. Это снижает нагрузку на склады, но бьет по дисциплине, порядку и отношению населения."
 ADISCORD_logistics_centralized_depots: "Централизованные склады"
 ADISCORD_logistics_centralized_depots_desc: "Снабжение собирается в крупные склады и управляется из единого центра. Армия получает более ровный поток ресурсов, но система становится тяжелее."
 ADISCORD_logistics_motorized_supply: "Моторизованное снабжение"
 ADISCORD_logistics_motorized_supply_desc: "Грузы идут быстрее за счет транспорта, горючего и ремонтных служб. Фронт становится подвижнее, но промышленность платит за эту скорость металлом и топливом."
 ADISCORD_logistics_emergency_requisitioning: "Чрезвычайные реквизиции"
 ADISCORD_logistics_emergency_requisitioning_desc: "Государство берет нужное там, где оно есть, и обещает разобраться потом. Война получает ресурс немедленно, общество получает новую причину ненавидеть списки."
 ADISCORD_training_irregular_exercises: "Нерегулярные сборы"
 ADISCORD_training_irregular_exercises_desc: "Подготовка идет рывками, через местные учения и короткие сборы. Солдат можно собрать быстро, но единая армейская школа остается слабой."
 ADISCORD_training_standardized_program: "Стандартизированная программа"
 ADISCORD_training_standardized_program_desc: "Учебные части работают по единым нормативам и расписаниям. Армия становится предсказуемее, а командиры лучше понимают, чего ждать от пополнения."
 ADISCORD_training_officer_led_wargames: "Офицерские штабные игры"
 ADISCORD_training_officer_led_wargames_desc: "Командиры учатся воевать на картах, сценариях и разборе ошибок. Это развивает планирование, но требует времени, штабов и спокойной подготовки."
 ADISCORD_training_accelerated_bootcamps: "Ускоренные лагеря подготовки"
 ADISCORD_training_accelerated_bootcamps_desc: "Новобранцев прогоняют через жесткие короткие курсы перед отправкой в части. Армия получает людей быстрее, но качество подготовки проседает."
 ADISCORD_internal_security_neighborhood_watch: "Соседский надзор"
 ADISCORD_internal_security_neighborhood_watch_desc: "Порядок частично держится на местных наблюдателях, старостах и добровольных патрулях. Это дешево и удобно, пока личные счеты не начинают выдавать за безопасность."
 ADISCORD_internal_security_investigative_bureaus: "Следственные бюро"
 ADISCORD_internal_security_investigative_bureaus_desc: "Специальные отделы собирают сведения, ведут дела и давят организованную нелояльность. Порядок крепнет, но аппарат начинает требовать все больше полномочий."
 ADISCORD_internal_security_emergency_patrols: "Чрезвычайные патрули"
 ADISCORD_internal_security_emergency_patrols_desc: "В кризис улицы, узлы связи и склады берутся под усиленный контроль. Это помогает удержать страну, но забирает людей и ресурсы у обычной армии."
 ADISCORD_internal_security_internal_directorate: "Внутренний директорат безопасности"
 ADISCORD_internal_security_internal_directorate_desc: "Единая служба внутреннего контроля связывает полицию, гарнизоны и политический надзор. Государство видит больше, общество дышит меньше."
