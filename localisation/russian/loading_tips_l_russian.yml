l_russian:
 LOADING_TIP_0: " "Мир покупают не золотом. Его покупают памятью тех, кто уже не может возразить."\n- Пётр Иванов, из закрытой речи Совету мира"
 LOADING_TIP_1: " "Страна, пережившая бомбардировки, не становится мирной. Она становится осторожной."\n- Эрнест Дерлих, министр внутреннего согласия"
 LOADING_TIP_2: " "В горах не прячутся трусы. В горах ждут те, кому некуда отступать."\n- Максим Шабрат, письмо к северным гарнизонам"
 LOADING_TIP_3: " "Когда государство называет порок свободой, оно просит не задавать бухгалтерских вопросов."\n- Арина Вольт, нодрулская публицистка-диссидент"
 LOADING_TIP_4: " "Кефрейт не вторгается первым. Он подписывает контракт, ждёт засухи и приходит за платой."\n- Рудольф Кей, стеландский военный атташе"
 LOADING_TIP_5: " "Фадский пакт был написан чернилами. Стеланд помнит его как гарь на снегу."\n- Стефан Орлиц, историк Высокогорья"
 LOADING_TIP_6: " "Партия обещала праздник без конца. Она забыла сказать, кто будет убирать после гостей."\n- Лиана Мор, бывший инспектор портовой службы"
 LOADING_TIP_7: " "Нодрул дал нам язык свободы, но оставил словарь у себя."\n- Даниэль Фарн, профессор права Стеландского университета"
 LOADING_TIP_8: " "Если солдат в перевале спрашивает, кто оплатил его винтовку, перевал уже потерян."\n- Капитан Рен Вайс, горная стража"
 LOADING_TIP_9: " "Иванов купил небо. Землю под ним купили другие."\n- Марта Саль, журналистка “Утреннего склона”"
 LOADING_TIP_10: " "Самая крепкая тюрьма та, где заключённые спорят только о музыке."\n- Освальд Крин, автор “Фестивального государства”"
 LOADING_TIP_11: " "Шабрат не был голосом народа. Он был первым, кто понял, что народ снова может говорить."\n- Клара Бейс, хронистка перехода"
 LOADING_TIP_12: " "Улыбка порта — такая же часть таможенного контроля, как печать и подпись."\n- Гектор Лоран, начальник Стеландской гавани"
 LOADING_TIP_13: " "Нодрулские советники не отдавали приказов. Они объясняли, почему приказ уже разумен."\n- Эрнест Дерлих, служебная записка"
 LOADING_TIP_14: " "Пустыня всегда смотрит на снег с деловым интересом."\n- Генерал Сар Кеф, Кефрейтская контрактная лига"
 LOADING_TIP_15: " "Чёрная книга опасна не тем, что в ней правда. Опасно то, что в ней есть имена."\n- Ника Фольт, архивистка Нижнего рынка"
 LOADING_TIP_16: " "Народ можно отвлечь от боли. Нельзя отменить саму рану."\n- Доктор Эльмар Грей, дворцовый врач"
 LOADING_TIP_17: " "Когда старик перестаёт выходить на балкон, государство начинает говорить его голосом."\n- Юлиан Арс, придворный стенографист"
 LOADING_TIP_18: " "Улица молчит не потому, что согласна. Иногда она просто слушает, кто первым перестанет петь."\n- Роза Кальм, организатор молчаливого марша"
 LOADING_TIP_19: " "Гарнизон присягает тому, кто кормит его сегодня. Но в горах помнят, кто спас его вчера."\n- Полковник Витт Сорен, гарнизон Южного перевала"
 LOADING_TIP_20: " "Свобода, привезённая в ящиках с печатями Нодрула, пахнет складом."\n- Марк Лавьер, стеландский эссеист"
 LOADING_TIP_21: " "Фестиваль — это не праздник, если вокруг него стоят кордоны."\n- Адела Тир, певица закрытого клуба “Белый тоннель”"
 LOADING_TIP_22: " "Партия боялась не оружия Шабрата. Она боялась его имени на стене."\n- Тео Барс, студент Высокогорной академии"
 LOADING_TIP_23: " "Кефрейтские наёмники редко говорят о войне. Хороший подрядчик говорит о страховке."\n- Мирон Дах, торговый представитель перевалов"
 LOADING_TIP_24: " "Режим не рушится, когда люди узнают правду. Он рушится, когда они понимают, что знали её давно."\n- Селина Ворт, психолог Комиссии памяти"
 LOADING_TIP_25: " "Воркерланд дал гарантию. Нодрул дал метод. Стеланд дал молчание."\n- Филипп Рейн, дипломат без портфеля"
 LOADING_TIP_26: " "В порту нет случайных исчезновений. Есть только плохо оформленные перевозки."\n- Лиана Мор, показания закрытой комиссии"
 LOADING_TIP_27: " "Старые империи умирают громко. Малые страны умирают в расписаниях заседаний."\n- Артур Велл, политический теоретик Нодрула"
 LOADING_TIP_28: " "Шёлковый поводок мягок только для того, кто не пытается уйти."\n- Максим Шабрат, заметка на полях обращения"
 LOADING_TIP_29: " "Ни один банкет не вечен. Но некоторые успевают стать формой правления."\n- Эрнест Дерлих, частный дневник"
 LOADING_TIP_30: " "День, когда люди перестали танцевать, был страшнее любого митинга."\n- Роза Кальм, воспоминания о Стеландской ночи"
 LOADING_TIP_31: " "Карта высокогорья стоит дороже золота, если на ней отмечены источники воды."\n- Сарин Тей, кефрейтский геолог-контрактор"
 LOADING_TIP_32: " "Правда не всегда освобождает. Иногда она просто отменяет удобную ложь."\n- Даниэль Фарн, лекция о Фадском пакте"
 LOADING_TIP_33: " "Полиция праздника не защищает людей от насилия. Она защищает праздник от людей."\n- Ирма Стерн, бывший офицер внутренней службы"
 LOADING_TIP_34: " "Если дворец закрывает западное крыло, значит, восточное уже пишет историю."\n- Юлиан Арс, придворный стенографист"
 LOADING_TIP_35: " "Горы не любят центры. Центры всегда приходят за водой, дорогами или сыновьями."\n- Старейшина Лук Вайр, Северные склоны"
 LOADING_TIP_36: " "Лучший способ украсть страну — убедить её, что она получила отпуск."\n- Освальд Крин, “Фестивальное государство”"
 LOADING_TIP_37: " "Наёмник не спрашивает, кто прав. Он спрашивает, где проходит дорога снабжения."\n- Капитан Идрис Кол, Кефрейтская контрактная лига"
 LOADING_TIP_38: " "Нодрулская республика не оккупирует площади. Она занимает кафедры, банки и утренние эфиры."\n- Арина Вольт, запрещённое интервью"
 LOADING_TIP_39: " "Пётр Иванов хотел, чтобы дети больше не боялись неба. Он не заметил, чего они стали бояться на земле."\n- Клара Бейс, хронистка перехода"
 LOADING_TIP_40: " "Архивы горят быстро. Запах остаётся дольше режима."\n- Ника Фольт, архивистка Нижнего рынка"
 LOADING_TIP_41: " "Свидетель опасен не словами, а тем, что у него есть лицо."\n- Эрнест Дерлих, закрытая инструкция"
 LOADING_TIP_42: " "Война научила Стеланд молчать. Мир научил его улыбаться. Ни то, ни другое не было свободой."\n- Марта Саль, “После неба”"
 LOADING_TIP_43: " "Если партия говорит от имени Иванова, проверьте, может ли Иванов ещё говорить."\n- Доктор Эльмар Грей, записка без подписи"
 LOADING_TIP_44: " "Солдаты молчат до тех пор, пока их молчание не становится приказом."\n- Полковник Витт Сорен, гарнизон Южного перевала"
 LOADING_TIP_45: " "Нижний рынок был не ошибкой системы. Он был её бухгалтерией."\n- Лиана Мор, закрытые показания"
 LOADING_TIP_46: " "Кефрейт не нуждается в плодородной земле. Ему достаточно ключей от чужой."\n- Генерал Сар Кеф, речь перед контрактным сенатом"
 LOADING_TIP_47: " "Самая страшная зависимость — та, которую называют культурным обменом."\n- Даниэль Фарн, профессор права"
 LOADING_TIP_48: " "Турист видит огни. Гражданин знает, где выключатель."\n- Адела Тир, певица “Белого тоннеля”"
 LOADING_TIP_49: " "Когда имя Шабрата появилось на стенах, партия впервые посмотрела не на народ, а на краску."\n- Тео Барс, студент Высокогорной академии"
 LOADING_TIP_50: " "Порт улыбался так долго, что забыл, как выглядит обычное лицо."\n- Гектор Лоран, начальник гавани"
 LOADING_TIP_51: " "Нодрул не просит верности. Он просит совместимости."\n- Артур Велл, политический теоретик Нодрула"
 LOADING_TIP_52: " "Государство, которому нужен вечный праздник, уже боится тишины."\n- Селина Ворт, психолог Комиссии памяти"
 LOADING_TIP_53: " "В высокогорье даже слух идёт медленно, зато приходит вооружённым."\n- Рен Вайс, горная стража"
 LOADING_TIP_54: " "Не каждый договор с наёмниками является предательством. Некоторые просто успевают стать им позже."\n- Рудольф Кей, военный атташе"
 LOADING_TIP_55: " "Иванов был последней подписью мира. После него остались только подписи счетов."\n- Марк Лавьер, стеландский эссеист"
 LOADING_TIP_56: " "Если народ покупает забвение, счёт всё равно приходит государству."\n- Клара Бейс, хронистка перехода"
 LOADING_TIP_57: " "Праздник можно продлить указом. Радость — нет."\n- Роза Кальм, организатор марша"
 LOADING_TIP_58: " "Воркерланд рухнул, и все вдруг вспомнили, что страх был фундаментом дипломатии."\n- Филипп Рейн, дипломат без портфеля"
 LOADING_TIP_59: " "Дворец не боялся смерти Иванова. Дворец боялся, что перед смертью он проснётся."\n- Юлиан Арс, придворный стенографист"
 LOADING_TIP_60: " "Контрактор приходит с охраной. Потом охраняет договор. Потом договор охраняет его."\n- Мирон Дах, торговый представитель перевалов"
 LOADING_TIP_61: " "Если правда не помещается в газету, её пишут на стенах."\n- Тео Барс, студент Высокогорной академии"
 LOADING_TIP_62: " "Нодрулский мандат был красивой рамкой для чужой воли."\n- Арина Вольт, публицистка-диссидент"
 LOADING_TIP_63: " "Ни один режим не боится пьющих людей. Он боится трезвого утра."\n- Освальд Крин, “Фестивальное государство”"
 LOADING_TIP_64: " "Гарнизон, который колеблется, уже проголосовал против дворца."\n- Максим Шабрат, письмо к командирам"
 LOADING_TIP_65: " "Партия не врала о мире. Она врала о цене."\n- Марта Саль, “После неба”"
 LOADING_TIP_66: " "Высокогорье нельзя купить целиком. Но можно купить дорогу, шахту и того, кто ставит печать."\n- Сарин Тей, кефрейтский геолог"
 LOADING_TIP_67: " "Пока музыка громче вопросов, власть считает себя стабильной."\n- Адела Тир, певица закрытого клуба"
 LOADING_TIP_68: " "Фадский пакт был не концом войны. Он был сменой метода."\n- Стефан Орлиц, историк Высокогорья"
 LOADING_TIP_69: " "Детям обещали мирное небо. Взрослые получили рынок, где всё имеет цену."\n- Клара Бейс, хронистка перехода"
 LOADING_TIP_70: " "Дерлих не был чудовищем. Он был хуже: он был администратором неизбежности."\n- Селина Ворт, психолог Комиссии памяти"
 LOADING_TIP_71: " "В пустыне учатся считать воду. В политике — чужую слабость."\n- Идрис Кол, кефрейтский капитан"
 LOADING_TIP_72: " "Когда Нодрул говорит о реформах, найдите строку о собственности."\n- Даниэль Фарн, профессор права"
 LOADING_TIP_73: " "Шабрат понимал одну вещь: горы не простят того, кто продаст перевалы."\n- Лук Вайр, старейшина Северных склонов"
 LOADING_TIP_74: " "Народ, который слишком долго улыбается по приказу, однажды забывает, как просить разрешения."\n- Роза Кальм, организатор марша"
 LOADING_TIP_75: " "Сжечь архив — значит признать, что бумага сильнее полиции."\n- Ника Фольт, архивистка"
 LOADING_TIP_76: " "Не всякая столица находится на равнине. Иногда столица — это больной человек в закрытом крыле."\n- Юлиан Арс, придворный стенографист"
 LOADING_TIP_77: " "Наёмники Кефрейта смотрели на снег так, как банковский служащий смотрит на залог."\n- Рудольф Кей, военный атташе"
 LOADING_TIP_78: " "Свобода без границ быстро превращается в границу для тех, у кого нет денег."\n- Марк Лавьер, эссеист"
 LOADING_TIP_79: " "Партия называла это гармонией. Портовые рабочие называли это расписанием исчезновений."\n- Лиана Мор, инспектор портовой службы"
 LOADING_TIP_80: " "Чем меньше Иванов говорил, тем чаще его цитировали."\n- Доктор Эльмар Грей, дворцовый врач"
 LOADING_TIP_81: " "Город всё ещё танцевал. Это было не доказательством счастья, а доказательством привычки."\n- Адела Тир, певица “Белого тоннеля”"
 LOADING_TIP_82: " "Нодрул строил партии так, как инженеры строят мосты: чтобы по ним ходили чужие грузы."\n- Артур Велл, политический теоретик"
 LOADING_TIP_83: " "Кефрейтская бедность не делает Кефрейт честным. Она делает его терпеливым."\n- Филипп Рейн, дипломат"
 LOADING_TIP_84: " "В революции важны не первые крики, а первая дверь, которую не успели закрыть."\n- Максим Шабрат, записки в изгнании"
 LOADING_TIP_85: " "Если порт должен улыбаться, значит, море уже видело слишком многое."\n- Гектор Лоран, начальник гавани"
 LOADING_TIP_86: " "Мир Иванова держался на том, что никто не спрашивал, кто ставит подписи после полуночи."\n- Марта Саль, журналистка"
 LOADING_TIP_87: " "Великая ошибка партии была проста: она решила, что отвращение можно залить музыкой."\n- Селина Ворт, психолог"
 LOADING_TIP_88: " "Перевал, охраняемый чужими, перестаёт быть границей. Он становится обещанием будущей войны."\n- Рен Вайс, горная стража"
 LOADING_TIP_89: " "Когда советник говорит тихо, министр начинает думать, что решение принадлежит ему."\n- Эрнест Дерлих, частный дневник"
 LOADING_TIP_90: " "Ни один праздник не отменяет голода по достоинству."\n- Роза Кальм, организатор марша"
 LOADING_TIP_91: " "Шабрат был опасен не тем, что обещал победу. Он обещал конец спектакля."\n- Клара Бейс, хронистка"
 LOADING_TIP_92: " "Дворец скрывал болезнь Иванова так старательно, что страна заболела вместо него."\n- Доктор Эльмар Грей, записка без подписи"
 LOADING_TIP_93: " "Кефрейт умеет проигрывать песок и выигрывать шахты."\n- Сарин Тей, геолог-контрактор"
 LOADING_TIP_94: " "Нодрулские кредиты были похожи на подарки только в первый день."\n- Даниэль Фарн, профессор права"
 LOADING_TIP_95: " "Полиция праздника знала всех музыкантов по именам и всех недовольных по адресам."\n- Ирма Стерн, бывший офицер внутренней службы"
 LOADING_TIP_96: " "Горы не бунтуют. Они медленно отказываются подчиняться."\n- Лук Вайр, старейшина Северных склонов"
 LOADING_TIP_97: " "Нижний рынок не был под землёй. Просто государство смотрело поверх него."\n- Ника Фольт, архивистка"
 LOADING_TIP_98: " "Когда Воркерланд исчез, Стеланд впервые увидел, сколько рук держало его за плечи."\n- Филипп Рейн, дипломат"
 LOADING_TIP_99: " "Фестиваль учит забывать вчера. История начинает мстить завтра."\n- Освальд Крин, автор"
 LOADING_TIP_100: " "Гарнизоны не любят идеологию. Они любят ясные приказы, сухие склады и честную карту."\n- Полковник Витт Сорен"
 LOADING_TIP_101: " "Если власть боится свидетеля, значит, свидетель уже победил наполовину."\n- Лиана Мор, инспектор"
 LOADING_TIP_102: " "Иванов говорил о небе, потому что смотреть на землю было труднее."\n- Марта Саль, журналистка"
 LOADING_TIP_103: " "Нодрулский контроль редко выглядит как оккупация. Он выглядит как консультация."\n- Арина Вольт, публицистка"
 LOADING_TIP_104: " "Кефрейт продаёт безопасность тем, кто уже продал безопасность своим гражданам."\n- Рудольф Кей, атташе"
 LOADING_TIP_105: " "Самая тихая страна может оказаться самой громкой, когда выключают музыку."\n- Адела Тир, певица"
 LOADING_TIP_106: " "Народ не всегда хочет правды. Но он ненавидит, когда его считают слишком слабым для неё."\n- Селина Ворт, психолог"
 LOADING_TIP_107: " "В Стеланде даже снег казался архивом. Всё белое, пока не начнёшь копать."\n- Стефан Орлиц, историк"
 LOADING_TIP_108: " "Шабрат не создал гнев. Он дал ему адрес."\n- Тео Барс, студент"
 LOADING_TIP_109: " "Партия смыкала ряды не вокруг идеи, а вокруг сейфов."\n- Ника Фольт, архивистка"
 LOADING_TIP_110: " "Контракт с Кефрейтом всегда содержит два текста: один на бумаге, другой на дороге."\n- Мирон Дах, представитель перевалов"
 LOADING_TIP_111: " "Нодрулская республика любила Стеланд как витрину. Витрины не спрашивают, кто расставляет товар."\n- Марк Лавьер, эссеист"
 LOADING_TIP_112: " "Старый мир Иванова умер не в день его смерти. Он умер в день, когда все начали ждать её."\n- Юлиан Арс, стенографист"
 LOADING_TIP_113: " "Улица не нуждалась в лидере, пока не поняла, что лидер может быть именем на стене."\n- Роза Кальм, организатор марша"
 LOADING_TIP_114: " "Власть называла это стабильностью. Гарнизоны называли это паузой."\n- Витт Сорен, полковник"
 LOADING_TIP_115: " "Нижний рынок не скрывал государство. Он показывал его без парадной формы."\n- Лиана Мор, инспектор"
 LOADING_TIP_116: " "Если в горах появился чужой подрядчик, значит, кто-то в столице уже продал карту."\n- Рен Вайс, горная стража"
 LOADING_TIP_117: " "Партия родилась не здесь, но научилась говорить с местным акцентом."\n- Даниэль Фарн, профессор права"
 LOADING_TIP_118: " "Вечный праздник требует вечной охраны."\n- Ирма Стерн, бывший офицер"
 LOADING_TIP_119: " "Пока люди спорили о морали, Дерлих считал маршруты эвакуации."\n- Эрнест Дерлих, частный дневник"
 LOADING_TIP_120: " "Шёлковый поводок рвётся не от силы, а от стыда."\n- Арина Вольт, публицистка"
 LOADING_TIP_121: " "Кефрейтская армия бедна землёй, но богата причинами перейти границу."\n- Идрис Кол, капитан"
 LOADING_TIP_122: " "Портовые огни красивы издалека. Вблизи они похожи на допрос."\n- Гектор Лоран, начальник гавани"
 LOADING_TIP_123: " "Никто не контролирует переход, если все контролировали только слухи."\n- Клара Бейс, хронистка перехода"
 LOADING_TIP_124: " "Горы не нуждаются в столице, пока столица не приходит за их водой."\n- Лук Вайр, старейшина"
 LOADING_TIP_125: " "Иванов хотел мира для страны. Партия хотела страны для мира, который можно продать."\n- Марта Саль, журналистка"
 LOADING_TIP_126: " "Управляемая свобода — это свобода с расписанием, охраной и внешним куратором."\n- Освальд Крин, автор"
 LOADING_TIP_127: " "Если Шабрата стереть со стены, он появляется в разговоре."\n- Тео Барс, студент"
 LOADING_TIP_128: " "Дворецкая медицина лечила не Иванова, а календарь."\n- Доктор Эльмар Грей, врач"
 LOADING_TIP_129: " "Нодрул никогда не требовал благодарности. Благодарность была включена в договор."\n- Артур Велл, теоретик"
 LOADING_TIP_130: " "Кефрейтские концессии начинаются с шахты и заканчиваются флагом на заставе."\n- Сарин Тей, геолог"
 LOADING_TIP_131: " "Свидетель может исчезнуть. Свидетельство — не всегда."\n- Лиана Мор, инспектор"
 LOADING_TIP_132: " "Фестиваль государству нужен тогда, когда гимн уже не работает."\n- Адела Тир, певица"
 LOADING_TIP_133: " "Контроль над дворцом ничего не значит, если улица перестала верить в балкон."\n- Роза Кальм, организатор"
 LOADING_TIP_134: " "Воркерланд был громом. Нодрул стал проводкой. Кефрейт пришёл проверить счётчик."\n- Филипп Рейн, дипломат"
 LOADING_TIP_135: " "Стеланд был малой страной с большой памятью. Именно поэтому им было трудно управлять."\n- Стефан Орлиц, историк"
 LOADING_TIP_136: " "Партия смеялась над горными листовками, пока не начала считать бумагу."\n- Эрнест Дерлих, служебная заметка"
 LOADING_TIP_137: " "Нет более опасного солдата, чем тот, кто понял, что приказа можно дождаться от другой стороны."\n- Витт Сорен, полковник"
 LOADING_TIP_138: " "Нодрулский советник всегда знает, где заканчивается дружба и начинается протокол."\n- Даниэль Фарн, профессор"
 LOADING_TIP_139: " "Кефрейт не завидует снегу. Он завидует рекам под ним."\n- Идрис Кол, капитан"
 LOADING_TIP_140: " "Когда люди перестают петь, они начинают слышать шаги."\n- Селина Ворт, психолог"
 LOADING_TIP_141: " "Чернила Фадского пакта высохли давно. Но подписи всё ещё кровоточат."\n- Стефан Орлиц, историк"
 LOADING_TIP_142: " "Дерлих верил в порядок. Просто его порядок всегда требовал закрытых дверей."\n- Юлиан Арс, стенографист"
 LOADING_TIP_143: " "Народ можно заставить смеяться. Нельзя заставить его забыть, над чем он смеётся."\n- Марк Лавьер, эссеист"
 LOADING_TIP_144: " "Шабрат пришёл не из легенды. Легенда пришла туда, где он уже стоял."\n- Клара Бейс, хронистка"
 LOADING_TIP_145: " "Нижний рынок был сердцем режима, потому что там не притворялись."\n- Ника Фольт, архивистка"
 LOADING_TIP_146: " "Наёмники Кефрейта не любят долгие речи. Они любят короткие дороги."\n- Рудольф Кей, атташе"
 LOADING_TIP_147: " "Нодрулский мандат обещал модернизацию. Стеланд получил зависимость с хорошей типографикой."\n- Арина Вольт, публицистка"
 LOADING_TIP_148: " "Балкон пустует не тогда, когда на нём никого нет, а когда ему больше никто не верит."\n- Доктор Эльмар Грей, врач"
 LOADING_TIP_149: " "Гарнизон, который охраняет праздник, однажды забывает, как охранять страну."\n- Рен Вайс, горная стража"
 LOADING_TIP_150: " "Вечная музыка — это тоже форма цензуры."\n- Адела Тир, певица"
 LOADING_TIP_151: " "Если Кефрейт просит доступ к перевалам, он уже считает их временно чужими."\n- Мирон Дах, представитель перевалов"
 LOADING_TIP_152: " "Партия боялась не бунта, а сравнения: люди могли вспомнить, кем были до праздника."\n- Освальд Крин, автор"
 LOADING_TIP_153: " "Страна не просыпается сразу. Сначала ей просто становится противно спать."\n- Селина Ворт, психолог"
 LOADING_TIP_154: " "Шабрату не нужна была столица. Ему нужно было, чтобы столица начала ошибаться."\n- Максим Шабрат, записки"
 LOADING_TIP_155: " "Нодрул держал Стеланд мягко, потому что мягкий контроль труднее назвать контролем."\n- Артур Велл, теоретик"
 LOADING_TIP_156: " "Кефрейтская бедность была не слабостью, а аргументом, который носил форму винтовки."\n- Идрис Кол, капитан"
 LOADING_TIP_157: " "Архив — это место, где режим впервые встречает самого себя без музыки."\n- Ника Фольт, архивистка"
 LOADING_TIP_158: " "Иванов умер один раз. Его именем пытались править ещё много раз."\n- Юлиан Арс, стенографист"
 LOADING_TIP_159: " "Если мир требует, чтобы никто не открывал архивы, это не мир. Это перемирие с бухгалтерией."\n- Даниэль Фарн, профессор"
 LOADING_TIP_160: " "Высокогорье не богато. Оно просто имеет то, что нужно бедным соседям и жадным союзникам."\n- Сарин Тей, геолог"
 LOADING_TIP_161: " "В день, когда гарантия умерла, все старые договоры начали звучать как угрозы."\n- Филипп Рейн, дипломат"
 LOADING_TIP_162: " "Праздник продолжался, потому что никто не хотел быть первым трезвым."\n- Адела Тир, певица"
