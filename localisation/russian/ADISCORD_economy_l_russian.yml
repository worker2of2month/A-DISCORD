 ADISCORD_economy_can_take_debt: "Требуется управляемая долговая политика и долговая нагрузка ниже предела."
 ADISCORD_economy_can_issue_internal_bonds: "Требуется технология долговых инструментов, управляемая долговая политика и долговая нагрузка ниже предела."
 ADISCORD_economy_can_take_external_loan: "Требуется технология долговых инструментов, кредитоспособность §Y35§! и отсутствие тяжёлого долгового кризиса."
 ADISCORD_economy_can_print_money: "Требуется отсутствие критической перегрузки и недавней эмиссии."
 ADISCORD_economy_can_expand_money_emission: "Требуется отсутствие критической перегрузки, недавней эмиссии и чрезмерного фискального стресса."
 ADISCORD_economy_can_reduce_money_emission: "Требуется активная эмиссия."
 ADISCORD_economy_can_stabilize_macro: "Требуется казна §Y100§! и заметное макроэкономическое давление."
 ADISCORD_economy_can_restructure_debt: "Требуется развитая фискальная администрация, долг не ниже §Y100§! и высокий долговой кризис или нагрузка."
 ADISCORD_economy_can_invest_reserves: "Требуется управление резервами, казна §Y50§! и экономическая модель, допускающая инвестиционные программы."
 ADISCORD_economy_can_use_war_taxes: "Доступно только при войне, мобилизационной экономике или чрезвычайной фискальной политике."
 ADISCORD_economy_can_use_military_investment: "Требуется стандартизация вооружений, казна §Y50§! и модель, допускающая мобилизационную экономику."
 ADISCORD_economy_model_allows_advanced_taxation: "Требуется модель экономики, допускающая расширенное налогообложение."
 ADISCORD_economy_model_allows_state_planning: "Требуется государственно-координируемая, плановая или технократическая экономика."
 ADISCORD_economy_model_allows_market_expansion: "Требуется рыночная, смешанная или кланово-олигархическая модель экономики."
 ADISCORD_economy_model_allows_mobilization_economy: "Требуется модель экономики, допускающая мобилизационные программы."
 ADISCORD_economy_model_allows_technocratic_programs: "Требуется технократическая программа или подходящая модель экономики."
 ADISCORD_economy_model_allows_emergency_extraction: "Требуется война, мобилизационная экономика или чрезвычайная система изъятия."
 ADISCORD_economy_model_allows_oligarchic_deals: "Требуется модель экономики, допускающая элитные и кланово-олигархические сделки."


 # Economy law categories and merged economic systems
 economy: "Экономическая мобилизация"
 economy_desc: "Степень перевода хозяйства с мирного режима на военные нужды. Этот закон отвечает за vanilla-показатели: потребительские товары, темпы строительства, конверсию фабрик, топливо и военную промышленность. Казна A-DISCORD дополнительно считывает этот режим через модель экономики."
 trade_laws: "Торговая политика"
 trade_laws_desc: "Режим внешней торговли, экспорта ресурсов и доступа к рынкам. Торговая политика влияет на промышленность, исследования, экспорт и доходы казны от торговли."
 ADISCORD_economic_system_laws: "Экономическая система"
 ADISCORD_economic_system_laws_desc: "Структурная модель хозяйства страны: от аграрной и индустриализирующейся экономики до свободного рынка, плановой бюрократии и технократической системы. Этот закон связывает vanilla-модификаторы с казной, развитием страны и доступными экономическими решениями."

 undisturbed_isolation: "Ненарушенная изоляция"
 undisturbed_isolation_desc: "Государство почти не готово к внешнему кризису. Гражданская промышленность поглощена внутренними нуждами, военное строительство слабо, а мобилизационный аппарат не развернут."
 isolation: "Изоляция"
 isolation_desc: "Страна ограниченно взаимодействует с внешним миром и сохраняет слабый мобилизационный режим. Это снижает напряжение хозяйства, но сильно ограничивает военное производство."
 civilian_economy: "Гражданская экономика"
 civilian_economy_desc: "Мирный экономический режим. Гражданское строительство и внутренний рынок остаются приоритетом, а военная промышленность и конверсия фабрик разворачиваются медленно."
 low_economic_mobilisation: "Подготовительная мобилизация"
 low_economic_mobilisation_desc: "Государство начинает готовить промышленность к возможной войне, не ломая ещё мирный порядок. Военная промышленность получает первые приоритеты, но гражданская экономика всё ещё важна."
 partial_economic_mobilisation: "Частичная мобилизация"
 partial_economic_mobilisation_desc: "Заметная часть хозяйства переводится на военные рельсы. Военные заводы и конверсия ускоряются, гражданское строительство начинает уступать фронтовым потребностям."
 war_economy: "Военная экономика"
 war_economy_desc: "Военные нужды становятся главным приоритетом. Военная промышленность растёт быстрее, но гражданские доходы, стабильность и управляемость экономики начинают страдать."
 tot_economic_mobilisation: "Тотальная мобилизация"
 tot_economic_mobilisation_desc: "Экономика выжимается ради войны почти до предела. Военная промышленность получает максимум ресурсов, но мирная жизнь, стабильность и долгосрочное развитие платят за это высокую цену."
 free_trade: "Свободная торговля"
 free_trade_desc: "Страна открывает ресурсы и рынки внешнему миру. Это ускоряет промышленность и исследования, повышает торговые доходы, но делает экономику более прозрачной для чужой разведки и менее закрытой в кризис."
 export_focus: "Экспортный приоритет"
 export_focus_desc: "Сбалансированный торговый режим: значительная часть ресурсов идёт на экспорт, но государство сохраняет пространство для внутреннего планирования."
 limited_exports: "Ограниченный экспорт"
 limited_exports_desc: "Государство сокращает экспорт и удерживает больше ресурсов внутри страны. Это полезно в войну, но уменьшает выгоды открытой торговли."
 closed_economy: "Закрытая экономика"
 closed_economy_desc: "Внешняя торговля резко ограничена, а доступ к рынкам блокируется. Такой режим подходит для военной автаркии, но снижает гибкость и торговые доходы."
 ADISCORD_economic_system_agrarian: "Аграрная экономика"
 ADISCORD_economic_system_agrarian_desc: "Хозяйство опирается на землю, сырьё и локальный труд. Оно дешевле по энергии и устойчивее для слабого аппарата, но плохо тянет промышленность, исследования и массовую военную модернизацию."
 ADISCORD_economic_system_industrializing: "Индустриализирующаяся экономика"
 ADISCORD_economic_system_industrializing_desc: "Страна перестраивает хозяйство вокруг фабрик, инфраструктуры и нового рабочего класса. Строительство и промышленный рывок ускоряются, но система ещё не обладает зрелой эффективностью развитой экономики."
 ADISCORD_economic_system_free_market: "Свободный рынок"
 ADISCORD_economic_system_free_market_desc: "Частная инициатива, торговля и конкуренция становятся основой роста. Такая система даёт гибкость, торговые доходы и эффективность, но хуже переносит жёсткую военную мобилизацию."
 ADISCORD_economic_system_mixed: "Смешанная экономика"
 ADISCORD_economic_system_mixed_desc: "Компромисс между рынком, государственным регулированием и социальными обязательствами. Даёт устойчивую базу без ярко выраженных перекосов."
 ADISCORD_economic_system_state_coordinated: "Государственно-координируемая экономика"
 ADISCORD_economic_system_state_coordinated_desc: "Государство направляет инвестиции, отрасли и инфраструктуру, не уничтожая полностью автономию хозяйства. Модель сильна при нормальном уровне государственного развития."
 ADISCORD_economic_system_planned_bureaucratic: "Планово-бюрократическая экономика"
 ADISCORD_economic_system_planned_bureaucratic_desc: "Экономика управляется через планы, ведомства и административные приоритеты. Она усиливает тяжёлую промышленность и мобилизационные проекты, но теряет гибкость и дорожает для аппарата."
 ADISCORD_economic_system_mobilization: "Мобилизационная экономика"
 ADISCORD_economic_system_mobilization_desc: "Хозяйство подчинено чрезвычайному режиму: фронту, снабжению, реквизициям и военным заказам. Это резко усиливает военную промышленность, но давит на гражданские доходы, стабильность и развитие."
 ADISCORD_economic_system_oligarchic_clan: "Кланово-олигархическая экономика"
 ADISCORD_economic_system_oligarchic_clan_desc: "Ресурсы и отрасли распределены между влиятельными группами. Модель может быстро приносить деньги и поддерживать промышленность, но страдает от утечек, слабого налогового сбора и политической зависимости."
 ADISCORD_economic_system_technocratic: "Технократическая экономика"
 ADISCORD_economic_system_technocratic_desc: "Управление хозяйством опирается на экспертизу, данные, институты и инженерные программы. Это ускоряет исследования и эффективность, но требует дорогого аппарата и высокого развития страны."

 ADISCORD_economy_dashboard_buildings_block: "§YЭкономические здания§!\nДеловые центры: §Y[?ADISCORD_business_center_count|0]§! — доход/адм.\nНаучные центры: §Y[?ADISCORD_science_center_count|0]§! — развитие/НИОКР\nПромышленные кластеры: §Y[?ADISCORD_industrial_cluster_count|0]§! — регион/субсидии"
 ADISCORD_economy_buildings_tt: "§YЭкономические здания§!\nСчётчик идёт только по owned-регионам страны; глобальный подсчёт и скрытая столичная выдача не используются.\n\n§YДеловой центр§!\n§YДоход§!: основной источник дохода зданий: бизнес и торговля §G+0.85§! за уровень, экономические объекты §G+0.15§! за уровень.\n§YСодержание§!: административные расходы §R+0.15§! за уровень.\n§YРегиональный эффект§!: местная скорость строительства §G+2%§!, привлекательность слотов §G+2%§!.\n§YЛучше работает при§!: свободный рынок, смешанная экономика, кланово-олигархическая экономика.\n§YНедостатки§!: слабее в планово-бюрократической и мобилизационной экономике.\n\n§YНаучный центр§!\n§YДоход§!: прямой доход почти отсутствует: экономические объекты §G+0.02§! за уровень.\n§YСодержание§!: исследования §R+0.65§! и администрирование §R+0.25§! за уровень.\n§YРегиональный эффект§!: местная скорость строительства §G+3%§!, привлекательность слотов §G+3%§!.\n§YЛучше работает при§!: технократическая, государственно-координируемая и смешанная экономика.\n§YНедостатки§!: окупается через развитие, а не через казну.\n\n§YПромышленный кластер§!\n§YДоход§!: гражданская промышленность §G+0.18§! и экономические объекты §G+0.04§! за уровень; военная промышленность даёт только §G+0.05§! за уровень при специальных профилях.\n§YСодержание§!: военные/промышленные субсидии §R+0.25§! и администрирование §R+0.20§! за уровень.\n§YРегиональный эффект§!: местная скорость строительства §G+5%§!, привлекательность слотов §G+5%§!, энергопотребление фабрик §R+0.25§!.\n§YЛучше работает при§!: государственно-координируемая, планово-бюрократическая при развитом аппарате, мобилизационная экономика.\n§YНедостатки§!: не является лучшим прямым денежным зданием."
