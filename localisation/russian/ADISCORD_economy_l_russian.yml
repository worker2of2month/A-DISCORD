 ADISCORD_economy_action_internal_bonds_tt: "§YВыпустить внутренние облигации§!\n§G+100§! к казне, §R+115§! к долгу. Мягко снижает дефицитное давление, но повышает фискальный стресс.\n\n§YТребование:§! технология долговых инструментов, управляемая долговая политика, долговая нагрузка ниже предела и отсутствие недавнего займа."
 ADISCORD_economy_action_external_loan_tt: "§YВзять внешний заём§!\n§G+150§! к казне, §R+190§! к долгу. Требует кредитоспособность §Y35§! и отсутствие тяжёлого долгового кризиса.\n\n§YТребование:§! технология долговых инструментов, кредитоспособность §Y35§!, управляемая долговая нагрузка и отсутствие недавнего займа."
 ADISCORD_economy_action_repay_debt_tt: "§YПогасить часть долга§!\n§R-50§! казны, §G-60§! долга. Снижает фискальный стресс и перегрузку.\n\nТребуется казна §Y50§! и любой долг."
 ADISCORD_economy_action_restructure_debt_tt: "§YРеструктурировать долг§!\nСписывает около §G15%§! текущего долга, но повышает фискальный стресс, перегрузку и штраф реструктуризации.\n\n§YТребование:§! развитая фискальная администрация, долг не ниже §Y100§!, высокий долговой кризис или долговая нагрузка."
 ADISCORD_economy_action_toggle_auto_loan_tt: "§YАвтозайм§!\nТекущий режим: [GetADISCORDAutoLoanLoc].\n\nЕсли включён, месячный дефицит после исчерпания казны автоматически покрывается займом только на непокрытую часть и только в пределах долговой ёмкости. Если выключен, непокрытый дефицит повышает фискальный стресс."
 ADISCORD_economy_action_expand_emission_tt: "§YВключить эмиссию§!\nПовышает уровень эмиссии. Это помогает будущему покрытию дефицитов через макродавление, но больше не создаёт мгновенный пакет денег.\n\n§YТребование:§! нет критической перегрузки, недавней эмиссии и чрезмерного фискального стресса."
 ADISCORD_economy_action_reduce_emission_tt: "§YСвернуть эмиссию§!\nСнижает уровень эмиссии, инфляцию и ценовой шок, но немного повышает краткосрочный фискальный стресс.\n\n§YТребование:§! активная эмиссия."
 ADISCORD_economy_action_stabilization_tt: "§YСтабилизационный пакет§!\n§R-100§! казны. Снижает инфляцию, фискальный стресс, дефицитное давление, ценовой шок и перегрузку.\n\n§YТребование:§! казна §Y100§! и заметное макроэкономическое давление."
 ADISCORD_economy_action_invest_reserves_tt: "§YВложить резервы§!\n§R-50§! казны. Поддерживает прогресс экономического развития и месячный мультипликатор развития.\n\n§YТребование:§! управление резервами, казна §Y50§!, нет недавних инвестиций и экономическая модель допускает инвестиционные программы."
 ADISCORD_economy_action_civilian_investment_tt: "§YГражданские инвестиции§!\n§R-50§! казны. Даёт временный гражданский инвестиционный дух и прогресс экономического развития.\n\n§YТребование:§! управление резервами, казна §Y50§!, нет недавних инвестиций и экономическая модель допускает инвестиционные программы."
 ADISCORD_economy_action_military_investment_tt: "§YВоенные инвестиции§!\n§R-50§! казны. Даёт прогресс армейского развития и военный инвестиционный дух, но повышает перегрузку.\n\n§YТребование:§! стандартизация вооружений, казна §Y50§!, нет недавнего военного финансирования и модель допускает мобилизационную экономику."

