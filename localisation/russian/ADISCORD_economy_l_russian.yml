l_russian:
 ADISCORD_economy_management: "Экономическое управление"
 ADISCORD_economy_management_desc: "Управление казной, долгом, военными расходами, инвестициями и напряжением военной экономики."

 ADISCORD_economy_topbar_treasury_text: "Казна [?ADISCORD_economy_treasury|0] ([?ADISCORD_economy_monthly_balance|=+0])"
 ADISCORD_economy_topbar_treasury_tooltip: "§YГосударственная казна§!: [?ADISCORD_economy_treasury|0]/[?ADISCORD_economy_treasury_cap|0]\nРасчётный доход: [?ADISCORD_economy_monthly_income|G1]\nРасчётные расходы: [?ADISCORD_economy_monthly_expenses|R1]\nОжидаемый месячный баланс: [?ADISCORD_economy_monthly_balance|=+1]\nДолг: [?ADISCORD_economy_debt|0]/[?ADISCORD_economy_debt_capacity|0] ([?ADISCORD_economy_debt_ratio|0]%)\nСтавка: [?ADISCORD_economy_interest_rate|1]%  Обслуживание: [?ADISCORD_economy_debt_service|R1]\nИнфляция: [?ADISCORD_economy_inflation|0]  Фискальный стресс: [?ADISCORD_economy_fiscal_stress|0]\nЭмиссия: [GetADISCORDEmissionLevelLoc]\nПерегрузка государства: [?ADISCORD_economy_stretched_level|0]\nМодель экономики: [GetADISCORDEconomyModelLoc]\nСостояние экономики: [GetADISCORDEconomyCycleLoc]\nМультипликатор экономического развития: [?ADISCORD_economy_monthly_development_multiplier|0]%\n\nИнтерфейс пересчитывает прогноз еженедельно. Казна изменяется по итогам месячного экономического тика.\n\n§GЩелкните, чтобы открыть экономическую сводку.§!"
 ADISCORD_economy_dashboard_title: "Казна и экономика"
 ADISCORD_economy_dashboard_header_summary: "Казна: [?ADISCORD_economy_treasury|0]/[?ADISCORD_economy_treasury_cap|0]   Баланс: [?ADISCORD_economy_monthly_balance|=+1]   Долг: [?ADISCORD_economy_debt|0]/[?ADISCORD_economy_debt_capacity|0]\nИнфляция [?ADISCORD_economy_inflation|0] | Кредит [?ADISCORD_economy_creditworthiness|0] | Стресс [?ADISCORD_economy_fiscal_stress|0] | [GetADISCORDEconomyModelLoc]"
 ADISCORD_economy_dashboard_budget_block: "§YБюджет§!\nГосударственная казна: [?ADISCORD_economy_treasury|0]/[?ADISCORD_economy_treasury_cap|0]\nРасчётный доход: [?ADISCORD_economy_monthly_income|G1]\nРасчётные расходы: [?ADISCORD_economy_monthly_expenses|R1]\nОжидаемый баланс: [?ADISCORD_economy_monthly_balance|=+1]\nДолг: [?ADISCORD_economy_debt|0]/[?ADISCORD_economy_debt_capacity|0]\nСтавка: [?ADISCORD_economy_interest_rate|1]%\nОбслуживание долга: [?ADISCORD_economy_debt_service|R1]\nИнфляция: [?ADISCORD_economy_inflation|0]"
 ADISCORD_economy_dashboard_income_block: "§YДоходы§!\nРесурсная рента: [?ADISCORD_economy_resource_income|G1]\nДоход от торговли и бизнеса: [?ADISCORD_economy_business_income|G1]\nНалоги с населения: [?ADISCORD_economy_personal_income|G1]\nДоход от гражданских фабрик: [?ADISCORD_economy_consumer_goods_income|G1]\nДоход от военной промышленности: [?ADISCORD_economy_factory_income|G1]\nДоход от экономических объектов: [?ADISCORD_economy_building_income|G1]"
 ADISCORD_economy_dashboard_expenses_block: "§YРасходы§!\nСодержание армии: [?ADISCORD_economy_army_expenses|R1]\nСодержание авиации: [?ADISCORD_economy_airforce_expenses|R1]\nСодержание флота: [?ADISCORD_economy_navy_expenses|R1]\nВоенно-промышленные расходы: [?ADISCORD_economy_military_factory_expenses|R1]\nСоциальные расходы: [?ADISCORD_economy_social_expenses|R1]\nРасходы на образование и науку: [?ADISCORD_economy_research_expenses|R1]\nСтроительное финансирование: [?ADISCORD_economy_construction_expenses|R1]\nАдминистративные расходы: [?ADISCORD_economy_admin_expenses|R1]\nВосстановительные расходы: [?ADISCORD_economy_repair_expenses|R1]"
 ADISCORD_economy_dashboard_development_block: "§YЭкономическое развитие§!\nУровень: [?ADISCORD_economic_development_level|0]/5\nПрогресс: [?ADISCORD_economic_development_progress|0]/[?ADISCORD_economy_development_progress_required|0]\nБазовый прирост: [?ADISCORD_economy_base_monthly_development_gain|=+1]\nМультипликатор: [?ADISCORD_economy_monthly_development_multiplier|0]%\nИтоговый прирост: [?ADISCORD_economy_monthly_development_gain|=+1]"
 ADISCORD_economy_dashboard_pressure_block: "§YПерегрузка государства§!\nДолговая нагрузка: [?ADISCORD_economy_debt_pressure|0]\nВоенная усталость: [?ADISCORD_economy_war_fatigue_score|0] / ур. [?ADISCORD_economy_war_fatigue_level|0]\nПерегрузка: [?ADISCORD_economy_stretched_score|0] / ур. [?ADISCORD_economy_stretched_level|0]\nРабсила: [?ADISCORD_economy_workforce_drain_level|0]  Бомбардировки: [?ADISCORD_economy_bombing_disruption_level|0]"
 ADISCORD_economy_dashboard_macro_block: "§YФинансовая устойчивость§!\nКредитоспособность: [?ADISCORD_economy_creditworthiness|Y0]\nДолг/ёмкость: [?ADISCORD_economy_debt_ratio|Y0]%  Кризис: [?ADISCORD_economy_debt_crisis_level|Y0]\nФискальный стресс: [?ADISCORD_economy_fiscal_stress|Y0]  Изменение: [?ADISCORD_economy_fiscal_stress_delta|+=1]\nЭмиссия: [GetADISCORDEmissionLevelLoc]  Инфляция: [?ADISCORD_economy_inflation|Y1]%\nАвтозайм прошлого тика: §Y[?ADISCORD_economy_last_auto_borrowing|1]§!"
 ADISCORD_economy_dashboard_model_block: "§YМодель экономики§!\nТекущая модель: [GetADISCORDEconomyModelLoc]\nСостояние экономики: [GetADISCORDEconomyCycleLoc]\nОткрывает: [GetADISCORDEconomyModelUnlocksLoc]\nОграничения: [GetADISCORDEconomyModelPenaltiesLoc]"
 ADISCORD_economy_dashboard_spending_block: "§YБюджетные регуляторы§!\nНалоговая нагрузка: [GetADISCORDTaxBurdenModeLoc]\nВоенный бюджет: [GetADISCORDArmySpendingModeLoc]\nСтроительство: [GetADISCORDConstructionSpendingModeLoc]"
 ADISCORD_economy_dashboard_slider_labels: "Налоги\nАрмия\nСтройка"
 ADISCORD_economy_dashboard_decision_hint: "Долг, эмиссия, инвестиции и объекты пока доступны через решения. Следующий UI-проход должен перенести их в это окно."

 ADISCORD_economy_treasury_tt: "§YГосударственная казна§! — свободный бюджетный резерв страны. Казна используется для инвестиций, военных расходов, обслуживания долга и антикризисных мер.\n\nИнтерфейс пересчитывает прогноз еженедельно. Фактическое изменение казны происходит по итогам месячного экономического тика."
 ADISCORD_economy_stretched_tt: "§YПерегрузка государства§! отражает давление войны, дефицита, долга, инфляции, мобилизации и потерь на способность режима управлять экономикой. Чем выше перегрузка, тем слабее развитие и тем выше риск кризисных мер."
 ADISCORD_economy_development_multiplier_tt: "§YМультипликатор экономического развития§! умножает существующий базовый месячный прирост экономического развития. Если базовый прирост равен 0, итоговый прирост тоже будет 0."
 ADISCORD_economy_model_tt: "§YМодель экономики§! теперь задаётся отдельным законом экономической системы и связывает vanilla-показатели с казной A-DISCORD. Она определяет доступные финансовые инструменты, эффективность зданий, инвестиций и мобилизационных мер.\n\nОткрывает: [GetADISCORDEconomyModelUnlocksLoc]\nОграничения: [GetADISCORDEconomyModelPenaltiesLoc]"
 ADISCORD_economy_modifier_factors_tt: "§YМодификаторы экономики§!\nНалоговая эффективность: [?ADISCORD_economy_final_tax_collection_factor_bp|0]%\nДоход от торговли: [?ADISCORD_economy_final_trade_income_factor_bp|0]%\nГражданская промышленность: [?ADISCORD_economy_final_civilian_factory_income_factor_bp|0]%\nРасходы армии: [?ADISCORD_economy_final_army_expense_factor_bp|0]%\nСтроительные расходы: [?ADISCORD_economy_final_construction_expense_factor_bp|0]%\nДолговая ёмкость: [?ADISCORD_economy_final_debt_capacity_factor_bp|0]%\nОбслуживание долга: [?ADISCORD_economy_final_debt_service_factor_bp|0]%\nПроцентная ставка: [?ADISCORD_economy_final_interest_rate_factor_bp|0]%\nКредитоспособность: [?ADISCORD_economy_final_creditworthiness_factor_bp|0]%\nИнфляционное давление: [?ADISCORD_economy_final_inflation_pressure_factor_bp|0]%\nЭффективность эмиссии: [?ADISCORD_economy_final_money_printing_efficiency_factor_bp|0]%\nЦеновая стабильность: [?ADISCORD_economy_final_price_stability_factor_bp|0]%\nФискальный стресс: [?ADISCORD_economy_final_fiscal_stress_gain_factor_bp|0]% / [?ADISCORD_economy_final_fiscal_stress_resistance_factor_bp|0]%\nРост экономического развития: [?ADISCORD_country_development_final_economic_growth_factor_bp|0]%\n\n§LСтатические бонусы задаются фокусами, событиями и идеями через scripted economy API. Политические бонусы пересчитываются из действующих законов.§!"
 ADISCORD_economy_macro_tt: "§YМакроиндикаторы§! — это быстрый индикатор устойчивости, а не отдельная мини-игра. Дефицит сначала тратит казну. Если казны не хватает, растут дефицитное давление, фискальный стресс и перегрузка; долг больше не создаётся автоматически.\n\nДолг появляется через явные действия игрока: облигации, внешний заём, реструктуризация и т.п. В планово-бюрократической экономике рыночный цикл заменён плановым контуром: видимая инфляция слабее, но проблемы уходят в дефицит, очереди и перегрузку аппарата."
 ADISCORD_economy_tax_burden_tt: "§YНалоговая нагрузка§! задаёт, насколько жёстко государство извлекает деньги из существующей налоговой системы. Низкая нагрузка оставляет больше пространства деловой активности, высокая быстрее наполняет казну, но усиливает перегрузку и тормозит развитие."
 ADISCORD_economy_army_spending_tt: "§YВоенный бюджет§! регулирует финансирование армии. Сокращения экономят казну, но бьют по готовности. Экстренный приоритет резко повышает расходы и может усилить военную усталость."
 ADISCORD_economy_construction_spending_tt: "§YСтроительное финансирование§! регулирует темп государственных строек и программ развития. Ускорение стоит дороже, но поддерживает экономическое развитие."

