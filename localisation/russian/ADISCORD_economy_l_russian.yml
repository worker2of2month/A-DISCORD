 ADISCORD_debug_economy_add_trade_income_modifier: "§YTEST§!: +10% торгового дохода"
 ADISCORD_debug_economy_add_trade_income_modifier_desc: "Отладочно добавляет постоянный статический модификатор торгово-делового дохода через API экономики."
 ADISCORD_debug_economy_reduce_trade_income_modifier: "§YTEST§!: -10% торгового дохода"
 ADISCORD_debug_economy_reduce_trade_income_modifier_desc: "Отладочно снижает постоянный статический модификатор торгово-делового дохода через API экономики."
 ADISCORD_debug_economy_add_debt: "§YTEST§!: добавить долг"
 ADISCORD_debug_economy_add_debt_desc: "Отладочно добавляет долг и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_reduce_debt: "§YTEST§!: снизить долг"
