 ADISCORD_economy_open_dashboard_decision: "Открыть экономическую сводку"
 ADISCORD_economy_open_dashboard_decision_desc: "Открыть отдельную сводку государственной казны, расходов, развития и экономического давления."
 ADISCORD_economy_take_state_debt: "Взять государственный долг"
 ADISCORD_economy_take_state_debt_desc: "Пополнить казну за счёт займа. Это помогает сейчас, но увеличивает долг, обслуживание долга, инфляцию и перегрузку государства."
 ADISCORD_economy_repay_state_debt: "Погасить часть долга"
 ADISCORD_economy_repay_state_debt_desc: "Потратить резерв казны на снижение долга и будущих процентных платежей."
 ADISCORD_economy_expand_money_supply: "Расширить денежную массу"
 ADISCORD_economy_expand_money_supply_desc: "Устаревшая отладочная команда: повышает уровень эмиссии без мгновенного пакета денег."
 ADISCORD_economy_issue_internal_bonds: "Выпустить внутренние облигации"
 ADISCORD_economy_issue_internal_bonds_desc: "Занять средства внутри страны. Казна растёт немедленно, а долг, обслуживание и фискальный стресс увеличиваются по макроформуле."
 ADISCORD_economy_take_external_loan: "Взять внешний заём"
 ADISCORD_economy_take_external_loan_desc: "Получить более крупный заём при достаточной кредитоспособности. Это быстро пополнит казну, но сильнее ударит по долговому профилю."
 ADISCORD_economy_start_limited_emission: "Запустить ограниченную эмиссию"
 ADISCORD_economy_start_limited_emission_desc: "Повысить уровень эмиссии. Эмиссия помогает будущему покрытию дефицитов через макродавление, но не создаёт мгновенный пакет денег."
 ADISCORD_economy_reduce_emission: "Сократить эмиссию"
 ADISCORD_economy_reduce_emission_desc: "Понизить уровень эмиссии. Инфляционное давление ослабеет, но фискальная система краткосрочно станет жёстче."
 ADISCORD_economy_stabilization_package: "Пакет макростабилизации"
 ADISCORD_economy_stabilization_package_desc: "Потратить казну на снижение инфляции, фискального стресса, дефицитного давления и ценовых шоков."
 ADISCORD_economy_restructure_debt: "Реструктурировать долг"
 ADISCORD_economy_restructure_debt_desc: "Списать часть долга через принудительную реструктуризацию. Долговая нагрузка снизится, но кредитоспособность и доверие пострадают."
 ADISCORD_economy_early_repay_debt: "Досрочно погасить долг"
 ADISCORD_economy_early_repay_debt_desc: "Направить казну на досрочное погашение долга. Это снижает долговое давление и фискальный стресс."
 ADISCORD_economy_invest_reserves: "Влить резервные средства в экономику"
 ADISCORD_economy_invest_reserves_desc: "Потратить реальные резервы казны на поддержку экономического развития и строительства."
 ADISCORD_economy_war_taxes: "Военные налоги"
 ADISCORD_economy_war_taxes_desc: "Временно усилить сбор средств для войны. Казна получит доход, но общество и хозяйство почувствуют давление."
 ADISCORD_economy_civilian_investments: "Гражданские инвестиции"
 ADISCORD_economy_civilian_investments_desc: "Направить казённые резервы в гражданскую экономику, строительство и развитие."
 ADISCORD_economy_military_investments: "Военные инвестиции"
 ADISCORD_economy_military_investments_desc: "Направить казённые резервы в военное производство и армейскую готовность."
 ADISCORD_economy_decrease_army_spending: "Сократить армейские расходы"
 ADISCORD_economy_decrease_army_spending_desc: "Снизить режим армейского финансирования. Бюджет выиграет, но армия потеряет часть готовности."
 ADISCORD_economy_increase_army_spending: "Увеличить армейские расходы"
 ADISCORD_economy_increase_army_spending_desc: "Повысить режим армейского финансирования. Армия станет готовнее, но расходы и давление на государство вырастут."
 ADISCORD_economy_accelerate_construction_funding: "Ускорить строительное финансирование"
 ADISCORD_economy_accelerate_construction_funding_desc: "Повысить финансирование строительных программ и экономического развития."
 ADISCORD_economy_reduce_construction_funding: "Сократить строительное финансирование"
 ADISCORD_economy_reduce_construction_funding_desc: "Снизить расходы на строительство и развитие, чтобы облегчить бюджет."

 ADISCORD_debug_economy_rebuild_building_counters: "§YTEST§!: пересчитать экономические объекты страны"
 ADISCORD_debug_economy_rebuild_building_counters_desc: "Сбросить и заново собрать счётчики трёх экономических зданий только по owned-регионам страны."

 ADISCORD_debug_economy_add_100_treasury: "§YTEST§!: добавить 100 казны"
 ADISCORD_debug_economy_add_100_treasury_desc: "Отладочное решение экономики. Недоступно ИИ."
 ADISCORD_debug_economy_spend_50_treasury: "§YTEST§!: потратить 50 казны"
 ADISCORD_debug_economy_spend_50_treasury_desc: "Отладочное решение экономики. Проверяет блокировку при низкой казне."
 ADISCORD_debug_economy_add_25_development_progress: "§YTEST§!: добавить 25 прогресса развития"
 ADISCORD_debug_economy_add_25_development_progress_desc: "Отладочное решение экономики. Добавляет прогресс существующему экономическому развитию."
 ADISCORD_debug_economy_add_20_stretched: "§YTEST§!: добавить 20 перегрузки"
 ADISCORD_debug_economy_add_20_stretched_desc: "Отладочное решение экономики."
 ADISCORD_debug_economy_add_casualties_fatigue_proxy: "§YTEST§!: добавить усталость потерь"
 ADISCORD_debug_economy_add_casualties_fatigue_proxy_desc: "Отладочный прокси для проверки военной и демографической усталости без изменения населения."
 ADISCORD_debug_economy_toggle_gui_refresh: "§YTEST§!: обновить GUI экономики"
 ADISCORD_debug_economy_toggle_gui_refresh_desc: "Отладочное решение экономики."
 ADISCORD_debug_economy_add_trade_income_modifier: "§YTEST§!: +10% торгового дохода"
 ADISCORD_debug_economy_add_trade_income_modifier_desc: "Отладочно добавляет постоянный статический модификатор торгово-делового дохода через API экономики."
 ADISCORD_debug_economy_reduce_trade_income_modifier: "§YTEST§!: -10% торгового дохода"
 ADISCORD_debug_economy_reduce_trade_income_modifier_desc: "Отладочно снижает постоянный статический модификатор торгово-делового дохода через API экономики."
 ADISCORD_debug_economy_add_debt: "§YTEST§!: добавить долг"
 ADISCORD_debug_economy_add_debt_desc: "Отладочно добавляет долг и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_reduce_debt: "§YTEST§!: снизить долг"
 ADISCORD_debug_economy_reduce_debt_desc: "Отладочно снижает долг и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_add_inflation: "§YTEST§!: добавить инфляцию"
 ADISCORD_debug_economy_add_inflation_desc: "Отладочно повышает инфляцию и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_reduce_inflation: "§YTEST§!: снизить инфляцию"
 ADISCORD_debug_economy_reduce_inflation_desc: "Отладочно снижает инфляцию и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_add_fiscal_stress: "§YTEST§!: добавить фискальный стресс"
 ADISCORD_debug_economy_add_fiscal_stress_desc: "Отладочно повышает фискальный стресс и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_reduce_fiscal_stress: "§YTEST§!: снизить фискальный стресс"
 ADISCORD_debug_economy_reduce_fiscal_stress_desc: "Отладочно снижает фискальный стресс и пересчитывает макроиндикаторы."
 ADISCORD_debug_economy_recalculate_macro_indicators: "§YTEST§!: пересчитать макроиндикаторы"
 ADISCORD_debug_economy_recalculate_macro_indicators_desc: "Отладочно пересчитывает долговую ёмкость, кредитоспособность, ставку, обслуживание долга и связанные макроиндикаторы."
 ADISCORD_debug_economy_add_army_expense_modifier: "§YTEST§!: +10% армейских расходов"
 ADISCORD_debug_economy_add_army_expense_modifier_desc: "Отладочно повышает постоянный статический модификатор армейских расходов через API экономики."
 ADISCORD_debug_economy_reduce_army_expense_modifier: "§YTEST§!: -10% армейских расходов"
 ADISCORD_debug_economy_reduce_army_expense_modifier_desc: "Отладочно снижает постоянный статический модификатор армейских расходов через API экономики."
 ADISCORD_debug_economy_add_economic_development_growth_modifier: "§YTEST§!: +10% роста экономического развития"
 ADISCORD_debug_economy_add_economic_development_growth_modifier_desc: "Отладочно повышает постоянный статический модификатор роста существующего экономического развития."
 ADISCORD_debug_economy_reset_modifier_variables: "§YTEST§!: сбросить модификаторы экономики"
 ADISCORD_debug_economy_reset_modifier_variables_desc: "Сбрасывает статические модификаторы экономики и пересчитывает политические факторы из законов."
 ADISCORD_debug_economy_recalculate_policy_modifiers: "§YTEST§!: пересчитать политические модификаторы"
 ADISCORD_debug_economy_recalculate_policy_modifiers_desc: "Принудительно пересчитывает факторные переменные экономики из текущих законов и модели."
 ADISCORD_debug_economy_reset: "§YTEST§!: сбросить экономику"
 ADISCORD_debug_economy_reset_desc: "Сбрасывает переменные экономики к стартовым значениям."

 ADISCORD_business_center: "Деловой центр"
 ADISCORD_business_center_plural: "Деловые центры"
 ADISCORD_business_center_desc: "Региональный центр торговли, услуг и корпоративного управления. Основное денежное здание: усиливает доход от бизнеса и торговли, лучше работает при рыночной и смешанной экономике, требует небольшого административного обслуживания."
 ADISCORD_science_center: "Научный центр"
 ADISCORD_science_center_plural: "Научные центры"
 ADISCORD_science_center_desc: "Комплекс университетов, лабораторий и прикладных исследовательских организаций. Слабый прямой доход, но сильная долгосрочная поддержка исследований и развития; требует исследовательского и административного финансирования."
 ADISCORD_industrial_cluster: "Промышленный кластер"
 ADISCORD_industrial_cluster_plural: "Промышленные кластеры"
 ADISCORD_industrial_cluster_desc: "Сеть промышленных площадок, поставщиков и производственных связей. Усиливает региональную промышленность и производство, но требует субсидий, обслуживания и энергии; прямой доход казны низкий, военный доход появляется только при специальных профилях."

