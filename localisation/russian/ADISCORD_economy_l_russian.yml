 ADISCORD_debug_economy_add_20_stretched: "§YTEST§!: добавить 20 перегрузки"
 ADISCORD_debug_economy_add_20_stretched_desc: "Отладочное решение экономики."
 ADISCORD_debug_economy_add_casualties_fatigue_proxy: "§YTEST§!: добавить усталость потерь"
 ADISCORD_debug_economy_add_casualties_fatigue_proxy_desc: "Отладочный прокси для проверки военной и демографической усталости без изменения населения."
 ADISCORD_debug_economy_toggle_gui_refresh: "§YTEST§!: обновить GUI экономики"
