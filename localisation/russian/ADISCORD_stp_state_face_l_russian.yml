l_russian:
 STP_STATE_FACE_TITLE: "Здоровье лидера"
 STP_STATE_FACE_STAGE_TEXT: "[STPGetStateFaceStageName]"
 STP_STATE_FACE_TOOLTIP: "§YЗдоровье лидера§!\n\nСтабильность режима держится на нём лично: пока лидер способен удерживать аппарат, элиты, силовиков и публичный миф, государственная система сохраняет управляемость.\n\nУхудшение его состояния бьёт не только по человеку, но и по всей архитектуре власти."

 STP_STATE_FACE_STAGE_1_loc: "Голос площади"
 STP_STATE_FACE_STAGE_2_loc: "Воля порядка"
 STP_STATE_FACE_STAGE_3_loc: "Государственный миф"
 STP_STATE_FACE_STAGE_4_loc: "Тень новой войны"
 STP_STATE_FACE_STAGE_5_loc: "Мёртвый эфир"

 STP_STATE_FACE_STAGE_1_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §Yустойчивое§!.\n\nЛидер сохраняет работоспособность, контролирует публичный образ и лично удерживает режимную вертикаль. Стабильность системы пока воспринимается как естественное продолжение его воли."
 STP_STATE_FACE_STAGE_2_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §Yнапряжённое§!.\n\nПоявляются признаки перегрузки, но аппарат компенсирует их дисциплиной и контролем повестки. Режим всё ещё стабилен, однако всё заметнее, что его устойчивость завязана на физической сохранности лидера."
 STP_STATE_FACE_STAGE_3_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §Yистощение§!.\n\nЛидер всё чаще работает через доверенных лиц, записи и подготовленные выступления. Чтобы скрыть слабость, режим превращает его здоровье в закрытый вопрос государственной безопасности."
 STP_STATE_FACE_STAGE_4_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §Yкритическое§!.\n\nСистема держится на страхе перед вакуумом власти. Любая новость о состоянии лидера способна ударить по лояльности элит, устойчивости аппарата и вере масс в неизбежность режима."
 STP_STATE_FACE_STAGE_5_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §Yколлапс символа§!.\n\nЛидер больше не может лично удерживать систему. Аппарат пытается сохранить режим через записи, слухи, культ памяти и управляемый страх, но стабильность превращается в имитацию."

 STP_state_face_stage_1_tt:0 "§YЗдоровье лидера§!: §Yустойчивое состояние§!."
 STP_state_face_stage_2_tt:0 "§YЗдоровье лидера§!: §Yнапряжённое состояние§!."
 STP_state_face_stage_3_tt:0 "§YЗдоровье лидера§!: §Yистощение§!."
 STP_state_face_stage_4_tt:0 "§YЗдоровье лидера§!: §Yкритическое состояние§!."
 STP_state_face_stage_5_tt:0 "§YЗдоровье лидера§!: §Yколлапс символа§!."

 STP_state_face_public_speech: "Голос площади"
 STP_state_face_public_speech_desc: "Режим представляет себя как мандат, рождённый на открытой площади."
 STP_state_face_order_speech: "Воля порядка"
 STP_state_face_order_speech_desc: "Речь становится жёстче. Толпа больше не просто слушает — её организуют."
 STP_state_face_state_myth: "Государственный миф"
 STP_state_face_state_myth_desc: "Лидер становится не столько политиком, сколько носителем государственного нарратива."
 STP_state_face_new_war: "Тень новой войны"
 STP_state_face_new_war_desc: "Миф о грядущей войне переходит из риторики в доктрину."
 STP_state_face_dead_broadcast: "Мёртвый эфир"
 STP_state_face_dead_broadcast_desc: "Даже смерть не заставляет аппарат замолчать. Государство говорит через помехи, память и страх."
