l_russian:
 BM_HISTORY_TITLE: "Краткая история"
 GATHERING_STORM_NAME: "Раненый лев"
 GATHERING_STORM_DESC: "Империя Воркерланда долгие годы считалась главной силой континента, но её время прошло. Воркерланд горит в огне внутренних конфликтов, распавшихся институтов и старых долгов, которые больше некому скрывать.\n\nНа руинах прежнего порядка поднимаются новые государства. У каждого свои страхи, ресурсы и политические амбиции. Континент вступает в эпоху, где старые границы уже не гарантируют будущего, а власть достанется тем, кто сумеет собрать хаос в систему."
 OTHER_GATHERING_STORM_DESC: "На континенте появляются новые центры силы. Одни пытаются выжить среди обломков империи, другие уже готовят собственный рывок."
 BLITZKRIEG_NAME: "После удара"
 BLITZKRIEG_DESC: "К 2183 году первые потрясения перестали быть новостью и стали порядком дня. Государства, пережившие распад старой системы, укрепили границы, пересчитали союзников и привыкли жить с мыслью, что следующая война может начаться без предупреждения."
 HITTING_FAN_NAME: "И начинается"
 HITTING_FAN_DESC: "Да, всё верно. Коллекция зонтиков сегодня может пригодиться."
 STP_BOOKMARK_DESC: "Хотя Стеландер не был покорён в ходе 'великой' экспансии Воркерланда, сожжённые деревни всё ещё помнят бомбардировки и кровь, пролитую на некогда мирную землю.\n\nСтраной правит гедонистическая партия 'жёлтых касок'. На словах она выступает за минимальное вмешательство государства в экономику и личную жизнь граждан. На практике её главные желания - обогащение и власть, и пока ей это удаётся.\n\nЛидер партии, когда-то обещавший больше не допустить пролития крови на землю Стеландера, уже четвёртый срок подряд удерживает власть. В партии понимают, что дни старика, на котором держится система, сочтены. Это понимает и сопротивление во главе с Максимом Шабратом."
