 ADISCORD_metallurgical_complex: "Металлургический комплекс"
 ADISCORD_metallurgical_complex_plural: "Металлургические комплексы"
 ADISCORD_metallurgical_complex_desc: "Тяжёлый металлургический комбинат, превращающий бедное и вторичное сырьё в сталь. Крайне дорог, занимает слот региона и перегружает местную энергетику и строительный сектор. В одном регионе допускается только один тяжёлый ресурсный комплекс."
 ADISCORD_electrolysis_complex: "Электролизный комплекс"
 ADISCORD_electrolysis_complex_plural: "Электролизные комплексы"
 ADISCORD_electrolysis_complex_desc: "Энергоёмкая цепочка обогащения руды и электролиза для выпуска алюминия. Даёт стратегическую автономность ценой очень высокой стоимости, отдельного слота и заметной нагрузки на регион."
 ADISCORD_strategic_mining_complex: "Комплекс стратегической добычи"
 ADISCORD_strategic_mining_complex_plural: "Комплексы стратегической добычи"
 ADISCORD_strategic_mining_complex_desc: "Глубокие шахты, химическое выщелачивание и автоматические сортировочные линии для получения вольфрама. Самый дорогой ресурсный комплекс, ухудшающий местную стройку, энергобаланс и доступную рабочую силу."
 ADISCORD_thermal_power_complex: "Теплоэнергетический комплекс"
 ADISCORD_thermal_power_complex_plural: "Теплоэнергетические комплексы"
 ADISCORD_thermal_power_complex_desc: "Шахтно-энергетический комбинат, добывающий низкосортный уголь для региональной энергосети. Снижает энергетический дефицит, но загрязнение и обслуживающий персонал создают тяжёлую нагрузку на регион."
