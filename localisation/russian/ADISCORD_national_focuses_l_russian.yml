l_russian:

  STP_Nectar_of_the_Gods: "Нектар богов"
  STP_Nectar_of_the_Gods_desc: "После долгих бомбардировок Стеланд научился ценить не победу, а тишину над головой. Партия превратила это чувство в государственный культ: пей, улыбайся и не спрашивай, чем был куплен мир."

  STP_The_Man_Who_Bought_The_Sky: "Человек, купивший небо"
  STP_The_Man_Who_Bought_The_Sky_desc: "Пётр Иванов обещал невозможное: ни одна бомба больше не упадёт на Стеланд. Для одних он спаситель, для других — человек, который продал страну за право спокойно смотреть вверх."

  STP_When_The_Guarantee_Died: "Когда гарантия умерла"
  STP_When_The_Guarantee_Died_desc: "Воркерланд, старый гарант Фадского мира, лежит в руинах. Сделка, на которой держался Стеланд, больше не защищает никого — она лишь напоминает, сколько долгов осталось после праздника."

  STP_The_Dying_Feast: "Умирающий пир"
  STP_The_Dying_Feast_desc: "В залах столицы всё ещё играют оркестры, но гости уже смотрят не на сцену, а на двери. Старый порядок не рухнул — он медленно доедает сам себя за последним банкетным столом."

  STP_The_Doctors_Lie: "Врачи лгут"
  STP_The_Doctors_Lie_desc: "Официальные бюллетени уверяют страну, что Иванов бодр, разумен и продолжает руководить. За закрытыми дверями дворца врачи говорят совсем другим голосом."

  STP_The_Last_Signature: "Последняя подпись"
  STP_The_Last_Signature_desc: "Печать Иванова всё ещё придаёт силу законам, приказам и назначениям. Вопрос лишь в том, чья рука теперь подводит его руку к бумаге."

  STP_Cancel_The_Morning_Address: "Отменить утреннее обращение"
  STP_Cancel_The_Morning_Address_desc: "Каждое утро Иванов обращался к народу, напоминая о мире, купленном для Стеланда. Сегодня балкон останется пустым, и даже самые верные слушатели поймут, что что-то изменилось."

  STP_A_Glass_Raised_Too_High: "Бокал, поднятый слишком высоко"
  STP_A_Glass_Raised_Too_High_desc: "На последнем приёме бокалы поднимают за здоровье Отца мира. Но слишком многие в зале уже пьют не за его жизнь, а за то, что начнётся после неё."

  STP_The_Father_Of_Peace_Is_Gone: "Отец мира ушёл"
  STP_The_Father_Of_Peace_Is_Gone_desc: "Пётр Иванов умер. Теперь Стеланду придётся узнать, был ли его мир фундаментом новой страны или крышкой над гниющей ямой."

  STP_Foreign_Guests_At_The_Banquet: "Иностранные гости на банкете"
  STP_Foreign_Guests_At_The_Banquet_desc: "Пока партия делает вид, что контролирует ситуацию, за столом появляются новые руки. Нодрулские советники и кефрейтские подрядчики смотрят на Стеланд не как на союзника, а как на актив."

  STP_The_Valirian_Advisers: "Нодрулские советники"
  STP_The_Valirian_Advisers_desc: "Нодрулская республика давно присутствует в Стеланде через советников, кредиты, партийные школы, юридические миссии и культурные фонды. Нодрул не командует напрямую — он объясняет партии, как именно следует улыбаться."

  STP_The_Party_Was_Not_Born_Here: "Партия родилась не здесь"
  STP_The_Party_Was_Not_Born_Here_desc: "Гедонистическая партия любит говорить о национальном возрождении, но её язык, лозунги и правовые формулы пришли извне. Стеланд получил не свободу, а импортированную инструкцию по самоуспокоению."

  STP_Imported_Freedom: "Импортированная свобода"
  STP_Imported_Freedom_desc: "Нодрулская модель обещала освобождение от страха, морали и старой горной суровости. На деле она создала рынок, где всё продаётся, а слово «свобода» стало вывеской над чужой кассой."

  STP_Cut_The_Silk_Leash: "Перерезать нодрулский поводок"
  STP_Cut_The_Silk_Leash_desc: "Мягкая зависимость опаснее прямой оккупации: она не требует гарнизонов, пока элиты сами повторяют чужие слова. Если Стеланд хочет выжить, ему придётся научиться говорить собственным голосом."

  STP_Renew_The_Cultural_Mandate: "Обновить нодрулский мандат"
  STP_Renew_The_Cultural_Mandate_desc: "Нодрулская республика может снова стать страховкой партии: новые консультанты, новые кредиты, новые фестивали, новые оправдания. Стеланд сохранит фасад, если согласится не задавать вопросов о фундаменте."

  STP_Kefreite_Security_Offer: "Кефрейтское предложение безопасности"
  STP_Kefreite_Security_Offer_desc: "Кефрейт предлагает то, что у него получается лучше всего: вооружённых людей без лишних вопросов. Для партии это способ удержать перевалы, для Кефрейта — первый шаг к чужому высокогорью."

  STP_Contractors_In_The_Passes: "Подрядчики в перевалах"
  STP_Contractors_In_The_Passes_desc: "Наёмники приходят не как завоеватели, а как охрана контрактов, складов и дорог. Но каждый блокпост в горах делает Стеланд чуть менее хозяином собственной земли."

  STP_The_Desert_Watches_The_Snow: "Пустыня смотрит на снег"
  STP_The_Desert_Watches_The_Snow_desc: "Для бедного и засушливого Кефрейта стеландские высоты — это вода, руда и энергия. Они смотрят на снег не как на красоту, а как на ресурс, который кто-то слишком долго держал без пользы."

  STP_No_Mercenaries_In_Our_Mountains: "Никаких наёмников в наших горах"
  STP_No_Mercenaries_In_Our_Mountains_desc: "Горы спасли Стеланд от Воркерланда, и их не должны передать тем, кто пришёл под видом охраны. Даже разложенная страна может вспомнить, где проходит её последняя граница."

  STP_Sell_The_Highland_Concessions: "Продать высокогорные концессии"
  STP_Sell_The_Highland_Concessions_desc: "Партии нужны деньги, оружие и люди, готовые стрелять без колебаний. Кефрейт готов предоставить всё это — если Стеланд подпишет бумаги, которые потом будет трудно разорвать."

  STP_Rumours_In_The_Highlands: "Слухи в высокогорье"
  STP_Rumours_In_The_Highlands_desc: "В высокогорных посёлках всё чаще произносят имя Шабрата. Пока столица танцует, горы шепчутся о том, что мир Иванова был не концом войны, а долгой капитуляцией."

  STP_The_Mountain_Printing_House: "Горная типография"
  STP_The_Mountain_Printing_House_desc: "В заброшенных мастерских и школьных подвалах появляются листовки, манифесты и списки пропавших. Партия контролирует эфир, но бумага всё ещё умеет проходить через перевалы."

  STP_Hunt_The_Mountain_Cells: "Охота на горные ячейки"
  STP_Hunt_The_Mountain_Cells_desc: "Подполье нельзя победить одним рейдом, но можно заставить его бояться каждого соседа. Партия отправит людей в горы, чтобы тишина снова стала похожа на порядок."

  STP_A_Name_On_The_Walls: "Имя на стенах"
  STP_A_Name_On_The_Walls_desc: "Имя Шабрата появляется на стенах, мостах и остановках. Это ещё не восстание, но уже доказательство, что страх перестал быть монополией государства."

  STP_Erase_His_Name: "Стереть его имя"
  STP_Erase_His_Name_desc: "Надписи можно закрасить, листовки сжечь, свидетелей задержать. Партия знает: если имя врага исчезнет из города, многие решат, что исчез и сам враг."

  STP_The_Lower_Market: "Нижний рынок"
  STP_The_Lower_Market_desc: "Нижний рынок — это место, о котором официальные путеводители молчат. Там сходятся туристические деньги, чиновничьи подписи, исчезнувшие люди и архивы, способные похоронить половину партии."

  STP_Steal_The_Black_Ledger: "Украсть чёрную книгу"
  STP_Steal_The_Black_Ledger_desc: "Чёрная книга содержит имена клиентов, посредников и покровителей Нижнего рынка. Если она окажется в правильных руках, праздник может закончиться раньше, чем партия успеет выключить музыку."

  STP_Burn_The_Client_Archives: "Сжечь клиентские архивы"
  STP_Burn_The_Client_Archives_desc: "Иногда государство спасают не приказы, а пепел. Если документы Нижнего рынка исчезнут вовремя, многие влиятельные люди снова смогут называть себя патриотами."

  STP_The_First_Witness: "Первый свидетель"
  STP_The_First_Witness_desc: "Один живой свидетель опаснее тысячи слухов. Его показания могут связать фасад туристического рая с тем, что партия годами прятала под ним."

  STP_Silence_The_First_Witness: "Заставить первого свидетеля молчать"
  STP_Silence_The_First_Witness_desc: "Свидетель не обязан умереть, чтобы перестать быть проблемой. Достаточно страха, сделки, исчезновения из публичного поля — и правда снова станет слухом."

  STP_Lower_Market_Dossiers: "Досье Нижнего рынка"
  STP_Lower_Market_Dossiers_desc: "Собранные досье превращают отдельные истории в систему. Теперь это уже не преступления отдельных людей, а карта государства, которое научилось торговать собственной тенью."

  STP_The_Port_Must_Smile: "Порт должен улыбаться"
  STP_The_Port_Must_Smile_desc: "Порт — лицо Стеланда перед внешним миром. Он должен сиять, принимать гостей и делать вид, что за складскими воротами нет ничего, кроме логистики и морского ветра."

  STP_The_Old_Man_On_The_Balcony: "Старик на балконе"
  STP_The_Old_Man_On_The_Balcony_desc: "Балкон Иванова стал священным местом режима: пока старик выходит к народу, мир кажется настоящим. Но с каждым днём всё труднее понять, кого именно народ видит — лидера или декорацию."

  STP_Show_Him_The_Truth: "Показать ему правду"
  STP_Show_Him_The_Truth_desc: "Если Иванов ещё способен понимать, ему нужно увидеть, чем стала его сделка. Возможно, даже Отец мира не готов признать эту страну своим наследием."

  STP_Govern_In_His_Name: "Править от его имени"
  STP_Govern_In_His_Name_desc: "Живой символ полезнее живого политика. Пока имя Иванова стоит под приказами, партия может утверждать, что всё происходящее — продолжение его воли."

  STP_The_Last_Confession: "Последняя исповедь"
  STP_The_Last_Confession_desc: "Перед концом человек может попытаться сказать правду — хотя бы самому себе. Последняя исповедь Иванова способна изменить не прошлое, а право говорить от его имени."

  STP_The_Hand_That_Still_Signs: "Рука, которая всё ещё подписывает"
  STP_The_Hand_That_Still_Signs_desc: "Рука Иванова дрожит, но подпись остаётся подписью. Для аппарата этого достаточно: стране не нужен голос лидера, пока его печать ещё работает."

  STP_Call_For_Shabrat: "Позвать Шабрата"
  STP_Call_For_Shabrat_desc: "Если Шабрат попадёт во дворец до смерти Иванова, переход может получить неожиданную легитимность. Это рискованный ход: партия не простит попытку забрать у неё последнего святого."

  STP_Seal_The_Western_Wing: "Запечатать западное крыло"
  STP_Seal_The_Western_Wing_desc: "Западное крыло дворца закрывается для всех, кроме самых надёжных людей. Отныне Иванов будет говорить с народом только через тех, кто уже решил, что он должен сказать."

  STP_The_City_Still_Dances: "Город всё ещё танцует"
  STP_The_City_Still_Dances_desc: "Столица держится за привычный ритм: музыка, огни, бары и толпы гостей. Чем страшнее слухи, тем громче город пытается доказать, что ничего не происходит."

  STP_The_Silent_Mountain_March: "Молчаливый горный марш"
  STP_The_Silent_Mountain_March_desc: "Люди из гор не всегда кричат лозунги. Иногда достаточно пройти по улицам молча, чтобы столица впервые услышала то, что она так долго заглушала музыкой."

  STP_One_Last_National_Festival: "Последний национальный фестиваль"
  STP_One_Last_National_Festival_desc: "Партия устроит праздник такого масштаба, чтобы страна забыла о болезни Иванова, слухах и пропавших архивах. Если реальность мешает власти, её можно временно перекричать."

  STP_The_People_Stop_Singing: "Люди перестают петь"
  STP_The_People_Stop_Singing_desc: "Когда толпа перестаёт подпевать, это ещё не революция. Но для режима, построенного на вечном празднике, молчание опаснее открытого гнева."

  STP_Drown_The_Rumours_In_Music: "Утопить слухи в музыке"
  STP_Drown_The_Rumours_In_Music_desc: "Слухи не обязательно опровергать — их можно сделать неслышными. Громче сцена, ярче вывески, дешевле алкоголь, и город снова поверит, что тишина была ошибкой."

  STP_Count_The_Loyalists: "Пересчитать лояльных"
  STP_Count_The_Loyalists_desc: "В последние дни Иванова важны не речи, а списки: кто поднимет трубку, кто отдаст приказ, кто откроет ворота и кто сделает вид, что ничего не слышал."

  STP_Turn_The_Young_Officers: "Перевербовать молодых офицеров"
  STP_Turn_The_Young_Officers_desc: "Молодые офицеры устали охранять витрину, в которую сами не верят. Если их сомнения превратить в дисциплину, у Шабрата появится опора не только в горах."

  STP_Feed_The_Festival_Police: "Накормить фестивальную полицию"
  STP_Feed_The_Festival_Police_desc: "Фестивальная полиция знает улицы, клубы, порты и лица. Дайте им деньги, полномочия и безнаказанность — и праздник снова станет управляемым."

  STP_Garrisons_Hesitate: "Гарнизоны колеблются"
  STP_Garrisons_Hesitate_desc: "Гарнизоны привыкли ждать приказа сверху, но верх теперь болен, закрыт и противоречив. В такой момент нейтралитет может оказаться первым шагом к измене."

  STP_Garrisons_Swear_Loyalty: "Гарнизоны клянутся в верности"
  STP_Garrisons_Swear_Loyalty_desc: "Партия требует от гарнизонов не размышлений, а клятвы. Кто присягнул сейчас, тот уже не сможет легко сказать, что просто выполнял приказ."

  STP_The_Mountain_Window: "Горное окно"
  STP_The_Mountain_Window_desc: "Смерть Иванова открыла короткий промежуток, в котором партия ещё не успела сомкнуть ряды, а горы уже готовы говорить. Если Шабрат действует сейчас, история Стеланда может свернуть с праздничной дороги."

  STP_No_One_Controls_The_Transition: "Никто не контролирует переход"
  STP_No_One_Controls_The_Transition_desc: "Иванов умер, но ни одна сила не смогла забрать его наследие целиком. Стеланд входит в переход без хозяина, без доверия и без уверенности, что утро вообще наступит мирно."

  STP_The_Party_Closes_Ranks: "Партия смыкает ряды"
  STP_The_Party_Closes_Ranks_desc: "Старик умер, но аппарат жив. Партия пережила своего святого и теперь сделает всё, чтобы доказать: мир Иванова принадлежал не Иванову, а тем, кто научился им управлять."

  STP_Side_With_Maksim_bm: "Поддержать сопротивление"
  STP_Side_With_Maksim_bm_desc: "Шабрат и его сторонники ещё слабы, но именно слабые силы чаще всего первыми видят трещины в системе. Поддержать их — значит поставить будущее Стеланда выше удобной лжи настоящего."

  STP_Operation_Last_Banquette_bm: "Операция «Последний банкет»"
  STP_Operation_Last_Banquette_bm_desc: "Когда политический переход невозможно оформить законом, его оформляют заговором. Последний банкет может стать не праздником, а точкой, где старая элита перестанет быть неприкасаемой."

  STP_Side_With_The_Party_bm: "Поддержать партию"
  STP_Side_With_The_Party_bm_desc: "Партия знает все кабинеты, списки, деньги и слабости страны. Поддержать её — значит выбрать управляемую гниль вместо неизвестного падения."

  ##VAL

  VAL_The_Contract_State: "Государство контракта"
  VAL_The_Contract_State_desc: "Кефрейт не просит верности и не верит в клятвы. Здесь власть начинается с подписи, ставки и человека, который готов проследить, чтобы договор исполнили."

  VAL_The_Weaponry_Baron: "Оружейный барон"
  VAL_The_Weaponry_Baron_desc: "Валера Солгалов держит страну не речами, а цепью заводов, посредников и капитанов. Его трон не позолочен — он смазан машинным маслом и пороховой гарью."

  VAL_Price_Of_Loyalty: "Цена верности"
  VAL_Price_Of_Loyalty_desc: "В Кефрейте лояльность не наследуют и не воспитывают. Её покупают, пересматривают и оплачивают снова, пока у государства хватает оружия, денег и страха."

  VAL_Count_The_Captains: "Пересчитать капитанов"
  VAL_Count_The_Captains_desc: "Каждая рота знает своего командира лучше, чем столицу. Прежде чем страна двинется дальше, Солгалову нужно понять, какие капитаны служат Кефрейту, а какие — только следующему заказу."

  VAL_One_Ledger_One_Banner: "Одна книга, одно знамя"
  VAL_One_Ledger_One_Banner_desc: "Разрозненные контракты должны стать государственным реестром. Кефрейт останется рынком войны, но этот рынок будет говорить одним голосом."

  VAL_Factories_Like_Cathedrals: "Заводы как соборы"
  VAL_Factories_Like_Cathedrals_desc: "Оружейные фабрики Кефрейта гремят как молитва новой эпохи. Здесь сталь проходит через огонь и выходит языком, который понимают все границы."

  VAL_Keep_The_Lines_Hot: "Держать линии горячими"
  VAL_Keep_The_Lines_Hot_desc: "Конвейер не должен остывать, даже если земля вокруг мертва. Пока цеха работают, Кефрейт может покупать хлеб, влияние и время."

  VAL_Ballistics_Schools: "Баллистические школы"
  VAL_Ballistics_Schools_desc: "Эйнар Толл и его ученики превращают ремесло войны в учебную дисциплину. Снаряд должен лететь не туда, куда молятся, а туда, куда рассчитали."

  VAL_Brokered_Steel: "Сталь через посредников"
  VAL_Brokered_Steel_desc: "Мир не обязан любить Кефрейт, чтобы покупать у него оружие. Мирон Саблев знает: между моралью и поставкой всегда можно поставить ещё одну подпись."

  VAL_Export_Rifles_Not_Promises: "Экспортировать винтовки, не обещания"
  VAL_Export_Rifles_Not_Promises_desc: "Дипломаты торгуют словами, Кефрейт — вещами, которые стреляют. Покупатели могут презирать нас публично и всё равно ждать следующий караван."

  VAL_The_Mercenary_State: "Государство наёмников"
  VAL_The_Mercenary_State_desc: "Кефрейтская армия выросла из контрактов быстрее, чем из казарм. Она не всегда защищает землю, но отлично умеет защищать условия сделки."

  VAL_Hire_Out_War: "Сдать войну в аренду"
  VAL_Hire_Out_War_desc: "Чужие войны кормят кефрейтские семьи лучше, чем проклятая почва. Если кто-то хочет крови, Кефрейт предложит дисциплину, снаряжение и цену."

  VAL_Vorons_Companies: "Роты Ворона"
  VAL_Vorons_Companies_desc: "Кирилл Ворон предпочитает быстрые удары и людей, которые не задают лишних вопросов. Его роты появляются там, где контракт требует тишины."

  VAL_Stahls_Schedules: "Расписания Шталь"
  VAL_Stahls_Schedules_desc: "Эрика Шталь превращает наёмную массу в порядок: смены, маршруты, пайки, боевые окна. Даже грязная война должна идти по графику."

  VAL_Gromovs_Assault_Tables: "Штурмовые таблицы Громова"
  VAL_Gromovs_Assault_Tables_desc: "Борис Громов считает наступление арифметикой давления. Если цифры сходятся, люди идут вперёд; если нет — их заставляют сходиться."

  VAL_Morns_Supply_Trains: "Обозы Морн"
  VAL_Morns_Supply_Trains_desc: "Рената Морн знает, что контракт умирает не от пули, а от пустого склада. Её обозы держат кефрейтскую войну на колёсах."

  VAL_The_Harvest_Of_Ash: "Урожай пепла"
  VAL_The_Harvest_Of_Ash_desc: "Кефрейтская земля больше помнит снаряды, чем семена. Народ живёт среди сухих полей, костей и металла, который легче продать, чем превратить в хлеб."

  VAL_Field_Surgeons: "Полевые хирурги"
  VAL_Field_Surgeons_desc: "Лада Хром собирает людей обратно по частям, потому что Кефрейт не может позволить себе терять тела быстрее, чем подписывает контракты."

  VAL_Bread_From_Barracks: "Хлеб из казарм"
  VAL_Bread_From_Barracks_desc: "Когда деревни не кормят страну, государство кормит деревни через склады армии. Это унизительно, дорого и необходимо."

  VAL_Dead_Villages_Still_Count: "Мёртвые деревни всё ещё считаются"
  VAL_Dead_Villages_Still_Count_desc: "На карте Кефрейта есть места, где остались только списки жителей и ржавые колодцы. Государство может забыть их имена, но не может забыть, что пустота тоже имеет цену."

  VAL_Market_Roads_North: "Северные рыночные дороги"
  VAL_Market_Roads_North_desc: "Кефрейт ищет не друзей, а маршруты. Если караван проходит, если счёт оплачен, если оружие дошло до склада — дипломатия уже состоялась."

  VAL_Trading_Partners: "Торговые партнёры"
  VAL_Trading_Partners_desc: "WRK, NAM, IVN и WIT нужны поставки, а Кефрейту нужны рынки. Между ними нет любви, но есть взаимная привычка отвечать на запросы."

  VAL_October_Of_2160: "Октябрь 2160-го"
  VAL_October_Of_2160_desc: "Стеланд помнит октябрь иначе, чем Кефрейт. Одни называют его сделкой, другие — раной, но обе стороны знают, что старые подписи всё ещё бросают тень."

  VAL_Different_Views_On_Freedom: "Разные взгляды на свободу"
  VAL_Different_Views_On_Freedom_desc: "Для TFF свобода звучит как право не подчиняться. Для Кефрейта свобода слишком часто означает право подписать контракт и не спрашивать, кто будет умирать за его исполнение."

  VAL_Contracts_Outlive_Kings: "Контракты переживают королей"
  VAL_Contracts_Outlive_Kings_desc: "Лидеры стареют, партии трескаются, границы спорят с картами. Но пока в архивах лежат договоры, Кефрейт знает, кому звонить, что требовать и сколько это стоит."
