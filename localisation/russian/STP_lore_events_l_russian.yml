l_russian:
 stp_lore.1.t:0 "Нектар богов"
 stp_lore.1.d:0 "В Стеланде начало политического сезона редко похоже на начало кризиса. На набережных снова вывешены флаги, туристические кварталы залиты светом, а государственные каналы говорят о рекордном числе гостей, новых лицензиях и очередном фестивале мира. Для внешнего наблюдателя страна всё ещё выглядит как чудо, которое однажды выросло из камня, снега и пепла. После лет бомбардировок Стеланд научился продавать не промышленность и не армию, а само ощущение безопасности: музыку без конца, законное забвение, дешёвую радость и обещание, что политика больше никогда не придёт в дом обычного человека. Но за витринами праздника всё чаще видны трещины. В министерствах говорят тише, чем раньше. Портовые чиновники сжигают старые журналы посещений. В горных городках появляются листовки без подписи. Даже партийные функционеры понимают: пока Пётр Иванов жив, режим может ссылаться на старую сделку, на спасённое небо и на мир, купленный слишком дорогой ценой. Но если старик уйдёт, стране придётся впервые за десятилетия ответить на вопрос, что именно она построила под этим мирным небом."
 stp_lore.1.a:0 "Праздник начинается снова."
 stp_lore.2.t:0 "Человек, купивший небо"
 stp_lore.2.d:0 "В официальных учебниках Пётр Иванов описан почти без человеческих черт. Там он не стареет, не ошибается и не боится. Он появляется в последней главе войны как человек, который понял простую истину: Стеланд не мог победить Воркерланд в открытом небе, но мог сделать продолжение войны слишком дорогим и бессмысленным. Фадский пакт стал его главным триумфом. Имперские самолёты ушли, города перестали гореть, а дети, впервые за годы уснувшие без сирен, стали живым доказательством его правоты. Но пакт имел вторую сторону, о которой учебники говорят сухо и осторожно. Стеланд отказался от части собственного голоса. Старые горные союзы были разоружены, порты открыты для новых операторов, а Нодрулская республика получила право прислать советников, юристов и культурные миссии, которые должны были помочь стране стать современной. Тогда это называли лечением. Теперь всё больше людей спрашивает, не была ли это замена одной оккупации другой — более мягкой, более красивой и потому куда более глубокой."
 stp_lore.2.a:0 "Мир редко продают без условий."
 stp_lore.3.t:0 "Когда гарантия умерла"
 stp_lore.3.d:0 "Новость из руин Воркерланда пришла не как гром, а как плохая бухгалтерская справка. Старые дипломатические каналы молчали, гарнизоны бывшей империи не отвечали, а документы, которые десятилетиями считались фундаментом безопасности Стеланда, внезапно превратились в бумагу без подписи. Фадский пакт не был отменён. Он просто осиротел. Государство, которое обещало держать чужие бомбы подальше от стеландского неба, больше не могло удержать даже собственные столицы. В партии это поняли раньше народа. Одни предлагали объявить, что ничего не изменилось. Другие требовали срочно обновить внешние гарантии через Нодрул. Третьи смотрели на восток, где Кефрейт давно предлагал услуги своих контракторов. Но в высокогорье эта новость прозвучала иначе. Если старый гарант мёртв, значит, умерла и последняя причина терпеть тех, кто десятилетиями объяснял любую грязь необходимостью сохранить мир."
 stp_lore.3.a:0 "Старые гарантии больше не держат стены."
 stp_lore.4.t:0 "Иностранные гости на банкете"
 stp_lore.4.d:0 "Вечерний банкет во дворце должен был показать преемственность. Нодрулские советники прибыли без лишней помпы, кефрейтские представители — с охраной, которая слишком хорошо знала расположение служебных выходов. Министры улыбались, бокалы звенели, оркестр играл старые песни о мире, но за каждым тостом слышался другой вопрос: кто теперь будет держать Стеланд, если Воркерланд больше не может держать даже самого себя? Нодрул предлагал порядок через договоры, кредиты, медиа и обновлённый мандат партии. Кефрейт предлагал порядок проще: людей с оружием, контракты на охрану перевалов и временное присутствие там, где стеландские гарнизоны якобы слишком слабы. Ни один гость не говорил о захвате. Все говорили о помощи. Именно поэтому в коридорах дворца стало холоднее, чем на горных перевалах."
 stp_lore.4.a:0 "За столом стало слишком много рук."
 stp_lore.5.t:0 "Нодрулские советники"
 stp_lore.5.d:0 "Нодрулская республика никогда не называла себя хозяином Стеланда. Это было бы грубо и, что важнее, неэффективно. Она называла себя партнёром, наставником, старшим другом в трудном процессе модернизации. Нодрулские юристы помогали переписывать законы, нодрулские медиа учили страну говорить о свободе как о потреблении, нодрулские фонды финансировали партийные школы, где будущим министрам объясняли: народ, которому дали достаточно удовольствий, редко спрашивает о власти. Теперь, когда Воркерланд исчез как гарант, советники требуют не благодарности, а дисциплины. В их записках всё чаще появляется выражение управляемая преемственность. Они понимают, что смерть Иванова может сорвать режим в хаос, но ещё больше боятся другого: что Стеланд вспомнит, что партия родилась не в его горах, а в чужих кабинетах."
 stp_lore.5.a:0 "Они пришли не как оккупанты. Это было их главным преимуществом."
 stp_lore.6.t:0 "Кефрейтское предложение безопасности"
 stp_lore.6.d:0 "Кефрейтцы не тратили время на красивые слова. Их меморандум был коротким, сухим и почти оскорбительно честным: Стеланд обладает ресурсами, которые не способен защитить; Кефрейт обладает людьми, которые умеют защищать ресурсы. Речь шла о временных охранных контрактах, совместном контроле перевалов, безопасности горных шахт и консультативной миссии для стеландских частей. Ни в одном пункте не было слова оккупация. И всё же любой офицер, служивший в высокогорье, понимал, что означает этот язык. Сначала контракторы охраняют дорогу. Потом они требуют склад. Потом вокруг склада появляется их связь, их медицина, их командир и их флаг на рукаве. Кефрейт был беден землёй и водой, но богат привычкой выживать за счёт чужих войн. Для партии это был соблазн: готовая сила против улицы и Шабрата. Для гор — предупреждение, что страну могут продать не только музыкой, но и подписью под контрактом."
 stp_lore.6.a:0 "Пустыня смотрит на снег."
 stp_lore.7.t:0 "Умирающий пир"
 stp_lore.7.d:0 "В столице объявили неделю благодарности Иванову. На площадях поставили сцены, по радио снова зазвучали речи о мире, а партийные газеты напечатали старую фотографию: молодой Иванов стоит на фоне разбитого горного туннеля и смотрит в небо, где впервые за много лет нет самолётов. Людям предложили вспомнить не скандалы, не исчезновения и не портовые слухи, а тот первый день без бомб. Режим прекрасно знал, какую именно струну нужно тронуть. Но праздник стал странным. Чиновники приходили на трибуны с лицами людей, которые уже читали завещание. Врачей во дворце стало больше, чем музыкантов на площади. Ночью в западном крыле горел свет, а утром пресс-служба сообщала, что председатель отдыхает и продолжает работу с документами. Чем громче город танцевал, тем очевиднее становилось: этот пир устроен не в честь живого правителя, а вокруг политического тела, которое все стороны пытаются унаследовать."
 stp_lore.7.a:0 "Музыка стала звучать слишком громко."
 stp_lore.8.t:0 "Слухи в высокогорье"
 stp_lore.8.d:0 "В горах новости ходят быстрее официальных приказов. Их несут водители, священники старых дорог, бывшие сапёры, шахтёры и женщины, которые помнят, где стояли убежища во время бомбардировок. Сначала это были только разговоры: Иванов умирает, партия готовит преемника, Нодрул требует гарантий, Кефрейт смотрит на перевалы. Потом на стенах появились короткие надписи, сделанные одной и той же краской: Шабрат знает. Для столицы это звучало как провинциальная угроза. Для высокогорья — как пароль. Максим Шабрат ещё не имел армии, не контролировал министерства и не мог выступить по государственному каналу. Но у него было то, чего партия боялась больше оружия: возможность связать старую память о войне с новым отвращением к режиму. Если горы поверят, что мир Иванова был украден партией, они снова станут не территорией, а крепостью."
 stp_lore.8.a:0 "В горах редко шепчут просто так."
 stp_lore.9.t:0 "Нижний рынок"
 stp_lore.9.d:0 "Нижний рынок никогда не существовал на картах. Официально были туристические агентства, закрытые клубы, лечебные зоны, портовые склады и частные службы сопровождения. Неофициально там сходились деньги, зависимости, исчезновения и списки клиентов, которые не должны были попасть ни к одному прокурору. Партия называла это неконтролируемыми остатками военного времени. Силовики называли это источником оперативных средств. Портовые начальники просто не называли это никак. Теперь, когда старый режим слабел, рынок начал говорить. Не из совести, а из страха. Люди, десятилетиями продававшие молчание, вдруг поняли, что новый хозяин может сжечь их вместе с архивами. В подполье Шабрата ходили слухи о чёрной книге: списке имён, маршрутов, платежей и покровителей. Если она существует, она может не просто испачкать партию. Она может доказать, что праздник Стеланда всегда стоял на фундаменте, который нельзя показывать при свете."
 stp_lore.9.a:0 "Некоторые двери лучше не открывать. Именно поэтому их откроют."
 stp_lore.10.t:0 "Старик на балконе"
 stp_lore.10.d:0 "Последнее появление Иванова должно было быть коротким. Дворец вывел его на балкон к заранее отобранной толпе, камеры заняли правильные углы, диктор говорил о силе духа и преемственности. Старик поднял руку, и на несколько секунд столица увидела не символ, а человека: слишком худого, слишком медленного, слишком далёкого от плакатов, где он всё ещё стоял среди молодых солдат и обещал закрыть небо. В этот момент каждая фракция увидела своё. Партия увидела печать, которой ещё можно заверить любые решения. Шабрат увидел последний шанс сказать Иванову правду. Нодрул увидел риск, что символ выйдет из-под контроля. Кефрейт увидел государство, где власть держится на дыхании одного старика. После выступления врачи увели Иванова обратно, а дворец объявил, что председатель чувствует себя уверенно. В городе этому почти никто не поверил."
 stp_lore.10.a:0 "Балкон опустел быстрее, чем камеры успели выключиться."
 stp_lore.11.t:0 "Врачи лгут"
 stp_lore.11.d:0 "Медицинский бюллетень был составлен языком, который в Стеланде давно научились читать наоборот. Стабильное состояние означало ночной кризис. Плановая пауза означала отменённые встречи. Утомление после напряжённой работы означало, что подпись под документами уже ставит не рука политика, а аппарат, которому нужно ещё немного времени. Врачи не были заговорщиками. Они просто понимали, что правда о здоровье Иванова стала вопросом государственной безопасности. Тем временем в министерствах началась тихая гонка. Одни готовили тексты траурных речей, другие — списки арестов, третьи — письма в Нодрул и Кефрейт. В высокогорье ждали сигнала. В портах прятали архивы. На улицах танцы продолжались, но люди уже смотрели на экраны не ради концертов, а ради бегущей строки. Страна ещё не знала даты смерти Иванова, но уже жила так, будто эта дата назначена."
 stp_lore.11.a:0 "Бюллетени стали новым фронтом."
 stp_lore.12.t:0 "Отец мира ушёл"
 stp_lore.12.d:0 "Утреннее обращение отменили за двадцать минут до эфира. Сначала государственный канал поставил музыку, затем документальный фильм о восстановлении столицы, затем старую речь Иванова, где он обещал, что ни одна бомба больше не упадёт на Стеланд. К полудню даже самые осторожные люди перестали делать вид, что это техническая задержка. В западном крыле дворца закрыли окна. У ворот появились дополнительные посты. В министерствах начали звонить по спискам, подготовленным задолго до этого дня. Когда сообщение наконец вышло, оно было коротким и почти стерильным. Пётр Иванов, отец мира, архитектор Фадского пакта, человек, остановивший бомбардировки, ушёл из жизни после продолжительной болезни. В столице объявили траур. В портах начали исчезать люди. В горах перестали шептать. Нодрул потребовал управляемой преемственности, Кефрейт предложил помощь в обеспечении порядка, а партия впервые за десятилетия осталась без человека, именем которого оправдывала всё. Мир Иванова не рухнул в один миг. Он просто потерял последнее лицо, за которым можно было прятаться."
 stp_lore.12.a:0 "Теперь начинается настоящая политика."
