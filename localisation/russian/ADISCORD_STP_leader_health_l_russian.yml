l_russian:
 STP_LEADER_HEALTH_TITLE:0 "Здоровье лидера"
 STP_LEADER_HEALTH_STAGE_TEXT:0 "[STPGetLeaderHealthStageName]"
 STP_LEADER_HEALTH_TOOLTIP:0 "Здоровье Петра Иванова — персональный якорь устойчивости режима. Пока он удерживает центр системы, аппарат сохраняет вертикаль; любое ухудшение состояния запускает борьбу элит за контроль над будущим."

 STP_LEADER_HEALTH_STAGE_1:0 "Устойчивое здоровье"
 STP_LEADER_HEALTH_STAGE_2:0 "Нарастающая усталость"
 STP_LEADER_HEALTH_STAGE_3:0 "Ослабленное состояние"
 STP_LEADER_HEALTH_STAGE_4:0 "Критический кризис"
 STP_LEADER_HEALTH_STAGE_5:0 "Смерть лидера"

 STP_LEADER_HEALTH_STAGE_1_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §GУстойчивое здоровье§!.\n\nСтабильность режима всё ещё держится на фигуре Петра Иванова. Пока он остаётся активным центром власти, аппарат сохраняет дисциплину, элиты не рискуют открыто спорить о преемнике, а публичная легитимность режима выглядит цельной."
 STP_LEADER_HEALTH_STAGE_2_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §YНарастающая усталость§!.\n\nЛидер всё ещё контролирует систему, но его ресурс уже не кажется бесконечным. Вертикаль держится, однако внутри аппарата начинают осторожно считать риски: кто удержит режим, если здоровье Иванова продолжит ухудшаться?"
 STP_LEADER_HEALTH_STAGE_3_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §OОслабленное состояние§!.\n\nЗдоровье Иванова становится политическим фактором. Стабильность режима всё ещё завязана на нём, но теперь эта зависимость превращается в уязвимость: элиты нервничают, спецслужбы усиливают контроль, а вопрос преемственности перестаёт быть теорией."
 STP_LEADER_HEALTH_STAGE_4_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §RКритический кризис§!.\n\nРежим формально продолжает работать, но его несущая конструкция трещит. Чем слабее Иванов, тем агрессивнее аппарат пытается компенсировать личный вакуум дисциплиной, подозрениями и давлением на потенциальных претендентов."
 STP_LEADER_HEALTH_STAGE_5_TOOLTIP:0 "§YЗдоровье лидера§!\n\nТекущее состояние: §RСмерть лидера§!.\n\nПётр Иванов больше не удерживает систему лично. Всё, что прежде называлось стабильностью, теперь превращается в наследство, за которое будут бороться аппарат, партия, спецслужбы и претенденты на власть. Режим может сохранить его образ, но уже не может вернуть сам центр равновесия."

 STP_PETER_HEALTH_STAGE_1_DESC:0 "\n\n§YЗдоровье лидера§!: §Gустойчивое§!.\nСтабильность режима персонально завязана на §YПетре Иванове§!. Пока он остаётся активным центром власти, аппарат сохраняет дисциплину, а вопрос преемственности не выходит из закрытых кабинетов."
 STP_PETER_HEALTH_STAGE_2_DESC:0 "\n\n§YЗдоровье лидера§!: §Yнарастающая усталость§!.\n§YИванов§! всё ещё удерживает систему, но его ресурс уже не выглядит бесконечным. Вертикаль сохраняется, однако элиты начинают осторожно оценивать риски будущей передачи власти."
 STP_PETER_HEALTH_STAGE_3_DESC:0 "\n\n§YЗдоровье лидера§!: §Oослабленное состояние§!.\nЗдоровье §YИванова§! становится фактором внутренней политики. Чем очевиднее его слабость, тем сильнее режим зависит от принуждения, аппаратного баланса и контроля над разговором о преемнике."
 STP_PETER_HEALTH_STAGE_4_DESC:0 "\n\n§YЗдоровье лидера§!: §Rкритическое состояние§!.\nРежим по-прежнему держится на имени §YИванова§!, но сама фигура лидера уже не гарантирует равновесие. Внутри системы растёт тревога, а борьба за будущий центр власти становится почти неизбежной."
 STP_PETER_HEALTH_STAGE_5_DESC:0 "\n\n§YЗдоровье лидера§!: §Rсмерть лидера§!.\n§YПётр Иванов§! больше не удерживает режим лично. Стабильность, прежде собранная вокруг него, превращается в поле борьбы между партией, аппаратом, спецслужбами и претендентами на наследство."

 STP_leader_health_stage_1_tt:0 "§YЗдоровье лидера§! меняется: §GУстойчивое здоровье§!."
 STP_leader_health_stage_2_tt:0 "§YЗдоровье лидера§! меняется: §YНарастающая усталость§!."
 STP_leader_health_stage_3_tt:0 "§YЗдоровье лидера§! меняется: §OОслабленное состояние§!."
 STP_leader_health_stage_4_tt:0 "§YЗдоровье лидера§! меняется: §RКритический кризис§!."
 STP_leader_health_stage_5_tt:0 "§YЗдоровье лидера§! меняется: §RСмерть лидера§!."