l_russian:
 ADISCORD_society_development_1: "Степень развития общества: Разорванное общество"
 ADISCORD_society_development_1_desc: "Люди не доверяют институтам, соседям и коллективному действию. Политическая мобилизация слаба, общественная жизнь раздроблена, а население выживает поодиночке, а не как единое общество."
 ADISCORD_society_development_2: "Степень развития общества: Усталое общество"
 ADISCORD_society_development_2_desc: "Общество ещё функционирует, но оно истощено, пассивно и политически онемело. Люди способны подчиняться, работать и выживать, но редко организуются и почти не верят в общие проекты."
 ADISCORD_society_development_3: "Степень развития общества: Функционирующее общество"
 ADISCORD_society_development_3_desc: "Нормальная социальная структура с базовым гражданским доверием, общественным порядком и работающей институциональной жизнью. Такое общество может поддерживать реформы, мобилизацию и долгосрочные проекты, хотя его слабости всё ещё заметны."
 ADISCORD_society_development_4: "Степень развития общества: Консолидированное общество"
 ADISCORD_society_development_4_desc: "Общество обладает сильной гражданской организацией, внутренним доверием и коллективной дисциплиной. Институты могут опираться на население, а национальные проекты становятся проще в реализации."
 ADISCORD_society_development_5: "Степень развития общества: Мобилизованное общество"
 ADISCORD_society_development_5_desc: "Общество способно на исключительное коллективное усилие. Население может переносить лишения, поддерживать масштабные реформы и мобилизоваться для войны или восстановления, но чрезмерная мобилизация давит на личные свободы."

 ADISCORD_social_system_development_1: "Степень развития социалки: Социальный провал"
 ADISCORD_social_system_development_1_desc: "Образование, здравоохранение и социальная защита сломаны или почти отсутствуют. Человеческий капитал слаб, социальная мобильность низка, а государство не может надёжно защитить население."
 ADISCORD_social_system_development_2: "Степень развития социалки: Базовая социалка"
 ADISCORD_social_system_development_2_desc: "В стране есть базовые школы, первичная медицина и отдельные социальные службы, но качество неравномерно, а доступ слишком часто зависит от региона, класса или политических связей."
 ADISCORD_social_system_development_3: "Степень развития социалки: Рабочая социальная система"
 ADISCORD_social_system_development_3_desc: "Образование, медицина и социальная поддержка работают на приемлемом уровне. Государство способно готовить специалистов, поддерживать здоровье населения и сохранять стабильную рабочую силу."
 ADISCORD_social_system_development_4: "Степень развития социалки: Развитая социальная инфраструктура"
 ADISCORD_social_system_development_4_desc: "Сильные системы образования, здравоохранения и социальной защиты. Человеческий капитал высок, общественные услуги надёжны, а страна способна поддерживать сложное экономическое и военное развитие."
 ADISCORD_social_system_development_5: "Степень развития социалки: Социальное государство"
 ADISCORD_social_system_development_5_desc: "Продвинутая социальная модель с сильным образованием, медициной, системой социального обеспечения и государственными услугами. Население здоровее, образованнее и продуктивнее, но содержание такой системы требует ресурсов и административной мощности."

 ADISCORD_army_development_1: "Степень развития армии: Разложившиеся гарнизоны"
 ADISCORD_army_development_1_desc: "Армия существует в основном на бумаге. Части плохо обучены, логистика слаба, офицеры коррумпированы или деморализованы, а боевая готовность крайне низка."
 ADISCORD_army_development_2: "Степень развития армии: Устаревшая армия"
 ADISCORD_army_development_2_desc: "Вооружённые силы способны удерживать базовые позиции, но доктрина, оснащение и подготовка устарели. У армии ещё могут быть традиции, однако ей не хватает современной интеграции."
 ADISCORD_army_development_3: "Степень развития армии: Функционирующие вооружённые силы"
 ADISCORD_army_development_3_desc: "Обычная армия с рабочими командными структурами, базовой логистикой, подготовленными офицерами и приемлемой доктриной. Она способна вести конвенциональную войну, но без серьёзных преимуществ."
 ADISCORD_army_development_4: "Степень развития армии: Профессиональная армия"
 ADISCORD_army_development_4_desc: "Хорошо обученная и дисциплинированная армия с компетентным офицерством, более сильной логистикой, высокой готовностью и связной доктриной. Она способна проводить сложные операции."
 ADISCORD_army_development_5: "Степень развития армии: Интегрированная военная машина"
 ADISCORD_army_development_5_desc: "Высокоразвитая армия, где доктрина, логистика, промышленность, офицерский корпус и командные системы работают как единый механизм. Такой уровень даёт серьёзные военные преимущества, но должен достигаться с трудом."

 ADISCORD_cultural_development_1: "Степень развития культуры: Культурный распад"
 ADISCORD_cultural_development_1_desc: "Общественные нормы деградировали, культурные институты слабы, а общество захвачено цинизмом, эскапизмом или разрушительными привычками. Люди потребляют культуру, но почти не создают её."
 ADISCORD_cultural_development_2: "Степень развития культуры: Массовая культура потребления"
 ADISCORD_cultural_development_2_desc: "Культура существует в основном как развлечение, потребление и зрелище. Она способна стабилизировать общество в мирное время, но ослабляет дисциплину и долгосрочную устойчивость."
 ADISCORD_cultural_development_3: "Степень развития культуры: Гражданская культура"
 ADISCORD_cultural_development_3_desc: "Сбалансированное культурное состояние с работающими школами, медиа, общественными нормами и гражданской этикой. У общества есть общий язык легитимности и ответственности."
 ADISCORD_cultural_development_4: "Степень развития культуры: Дисциплинированная культура"
 ADISCORD_cultural_development_4_desc: "Сильная культурная рамка с высокой общественной дисциплиной, серьёзными институтами и общим национальным или гражданским проектом. Это укрепляет сплочённость, но может становиться жёстким."
 ADISCORD_cultural_development_5: "Степень развития культуры: Высокая культура мобилизации"
 ADISCORD_cultural_development_5_desc: "Культура становится мощной мобилизующей силой. Образование, общественная этика, искусство, медиа и институты служат большому национальному проекту. Это усиливает сплочённость, но снижает плюрализм и гибкость."

 ADISCORD_state_development_1: "Степень развития государства: Рассыпающийся аппарат"
 ADISCORD_state_development_1_desc: "Государство едва функционирует. Приказы игнорируются, коррупция доминирует, налоги собираются плохо, а правительство не может надёжно проводить политику."
 ADISCORD_state_development_2: "Степень развития государства: Бумажное государство"
 ADISCORD_state_development_2_desc: "Государство существует формально: с министерствами, законами и процедурами. Но значительная часть аппарата неэффективна, захвачена фракциями или зависит от неформальных сетей."
 ADISCORD_state_development_3: "Степень развития государства: Функционирующее государство"
 ADISCORD_state_development_3_desc: "Нормальный государственный аппарат. Бюрократия, сбор налогов, правоохранительная система и администрация работают на базовом уровне. Страна способна проводить политику, хотя не всегда эффективно."
 ADISCORD_state_development_4: "Степень развития государства: Эффективная администрация"
 ADISCORD_state_development_4_desc: "Компетентное государство с дисциплинированной бюрократией, надёжными институтами и сильной способностью к реализации решений. Реформы, мобилизация и проекты развития становятся проще."
 ADISCORD_state_development_5: "Степень развития государства: Машина управления"
 ADISCORD_state_development_5_desc: "Высокоэффективный государственный аппарат, способный к быстрому исполнению, высокой координации и глубокому контролю над национальными ресурсами. Это мощный инструмент, но он может быть бюрократичным и жёстким."

 ADISCORD_economic_development_1: "Степень развития экономики: Разрушенная экономика"
 ADISCORD_economic_development_1_desc: "Производственные цепочки разорваны, рынки не доверяют государству, а хозяйство держится на случайных сделках и внешних подачках. Страна может выживать, но не может уверенно расти."
 ADISCORD_economic_development_2: "Степень развития экономики: Хрупкая экономика"
 ADISCORD_economic_development_2_desc: "Экономика работает, но слишком зависит от отдельных портов, посредников, сырья или политических связей. Любой серьёзный кризис быстро превращает слабость в обвал."
 ADISCORD_economic_development_3: "Степень развития экономики: Функционирующая экономика"
 ADISCORD_economic_development_3_desc: "Нормальная хозяйственная система с работающими рынками, базовой промышленностью, услугами и понятной финансовой средой. Рост возможен, но требует аккуратной политики и инвестиций."
 ADISCORD_economic_development_4: "Степень развития экономики: Развитая экономика"
 ADISCORD_economic_development_4_desc: "Экономика имеет устойчивую промышленность, качественные услуги, предсказуемые рынки и способность поддерживать сложные государственные проекты."
 ADISCORD_economic_development_5: "Степень развития экономики: Интегрированная экономика"
 ADISCORD_economic_development_5_desc: "Производство, финансы, торговля и инфраструктура связаны в мощную систему. Такая экономика быстро поддерживает реформы и войну, но требует компетентного управления."

