 ADISCORD_society_development_1_tt: "§YРазорванное общество§!\nЛюди не доверяют институтам, соседям и коллективному действию. Население выживает поодиночке, а не как единое общество.\n\n§YЭффекты:§!\nСтабильность: §R-6%§!\nПрирост политической власти: §R-0.05§!"
 ADISCORD_society_development_2_tt: "§YУсталое общество§!\nОбщество ещё функционирует, но оно истощено, пассивно и политически онемело.\n\n§YЭффекты:§!\nСтабильность: §R-3%§!"
 ADISCORD_society_development_3_tt: "§YФункционирующее общество§!\nЕсть базовое гражданское доверие, общественный порядок и работающая институциональная жизнь.\n\n§YЭффекты:§!\nСтабильность: §G+2%§!"
 ADISCORD_society_development_4_tt: "§YКонсолидированное общество§!\nСильная гражданская организация, внутреннее доверие и коллективная дисциплина помогают национальным проектам.\n\n§YЭффекты:§!\nСтабильность: §G+5%§!\nПрирост политической власти: §G+0.03§!"
 ADISCORD_society_development_5_tt: "§YМобилизованное общество§!\nОбщество способно на исключительное коллективное усилие, но чрезмерная мобилизация давит на личные свободы.\n\n§YЭффекты:§!\nСтабильность: §G+8%§!\nПоддержка войны: §G+4%§!\nПрирост политической власти: §G+0.05§!\nФактор фабрик на товары народного потребления: §R+2%§!"

 ADISCORD_social_system_development_1_tt: "§YСоциальный провал§!\nОбразование, медицина и социальная защита сломаны или почти отсутствуют.\n\n§YЭффекты:§!\nСкорость исследований: §R-5%§!\nСтабильность: §R-2%§!\nСкорость строительства: §R-3%§!"
 ADISCORD_social_system_development_2_tt: "§YБазовая социалка§!\nЕсть базовые школы, первичная медицина и отдельные службы, но качество неравномерно.\n\n§YЭффекты:§!\nСкорость исследований: §R-2%§!"
 ADISCORD_social_system_development_3_tt: "§YРабочая социальная система§!\nОбразование, медицина и социальная поддержка работают на приемлемом уровне.\n\n§YЭффекты:§!\nСкорость исследований: §G+1%§!\nСтабильность: §G+1%§!"
 ADISCORD_social_system_development_4_tt: "§YРазвитая социальная инфраструктура§!\nСильные системы образования, здравоохранения и социальной защиты повышают человеческий капитал.\n\n§YЭффекты:§!\nСкорость исследований: §G+4%§!\nСкорость строительства: §G+3%§!\nСтабильность: §G+2%§!"
 ADISCORD_social_system_development_5_tt: "§YСоциальное государство§!\nПродвинутая социальная модель делает население здоровее, образованнее и продуктивнее, но требует ресурсов.\n\n§YЭффекты:§!\nСкорость исследований: §G+6%§!\nСтабильность: §G+3%§!\nСкорость строительства: §G+4%§!\nФактор фабрик на товары народного потребления: §R+3%§!"

 ADISCORD_army_development_1_tt: "§YРазложившиеся гарнизоны§!\nАрмия существует в основном на бумаге: слабая подготовка, плохая логистика и низкая готовность.\n\n§YЭффекты:§!\nОрганизация дивизий: §R-8%§!\nВосстановление организации: §R-8%§!\nВремя подготовки: §R+12%§!\nПрирост командной власти: §R-0.05§!"
 ADISCORD_army_development_2_tt: "§YУстаревшая армия§!\nВооружённые силы могут держать позиции, но доктрина, оснащение и подготовка устарели.\n\n§YЭффекты:§!\nОрганизация дивизий: §R-4%§!\nВосстановление организации: §R-4%§!\nВремя подготовки: §R+6%§!"
 ADISCORD_army_development_3_tt: "§YФункционирующие вооружённые силы§!\nРабочие командные структуры, базовая логистика и приемлемая доктрина.\n\n§YЭффекты:§!\nОрганизация дивизий: §G+2%§!\nВосстановление организации: §G+2%§!"
 ADISCORD_army_development_4_tt: "§YПрофессиональная армия§!\nКомпетентное офицерство, лучшая логистика, высокая готовность и связная доктрина.\n\n§YЭффекты:§!\nОрганизация дивизий: §G+5%§!\nВосстановление организации: §G+5%§!\nВремя подготовки: §G-4%§!\nПрирост командной власти: §G+0.05§!"
 ADISCORD_army_development_5_tt: "§YИнтегрированная военная машина§!\nДоктрина, логистика, промышленность, офицерский корпус и командование работают как единая система.\n\n§YЭффекты:§!\nОрганизация дивизий: §G+8%§!\nВосстановление организации: §G+8%§!\nВремя подготовки: §G-6%§!\nПрирост командной власти: §G+0.10§!\nФактор фабрик на товары народного потребления: §R+2%§!"

 ADISCORD_cultural_development_1_tt: "§YКультурный распад§!\nОбщественные нормы деградировали, культурные институты слабы, а цинизм стал привычным языком.\n\n§YЭффекты:§!\nСтабильность: §R-5%§!\nЗащита от дрейфа идеологии: §R-10%§!\nПрирост политической власти: §R-0.03§!"
 ADISCORD_cultural_development_2_tt: "§YМассовая культура потребления§!\nКультура стабилизирует мирную жизнь как развлечение и спектакль, но ослабляет долгую дисциплину.\n\n§YЭффекты:§!\nСтабильность: §R-2%§!\nПоддержка войны: §R-2%§!"
 ADISCORD_cultural_development_3_tt: "§YГражданская культура§!\nЕсть работающие школы, медиа, общественные нормы и базовая гражданская этика.\n\n§YЭффекты:§!\nСтабильность: §G+2%§!\nЗащита от дрейфа идеологии: §G+5%§!"
 ADISCORD_cultural_development_4_tt: "§YДисциплинированная культура§!\nСильная культурная рамка укрепляет сплочённость и делает общество серьёзнее.\n\n§YЭффекты:§!\nСтабильность: §G+4%§!\nЗащита от дрейфа идеологии: §G+10%§!\nПрирост политической власти: §G+0.03§!"
 ADISCORD_cultural_development_5_tt: "§YВысокая культура мобилизации§!\nКультура становится мобилизующей силой большого национального проекта, но снижает гибкость.\n\n§YЭффекты:§!\nСтабильность: §G+6%§!\nПоддержка войны: §G+4%§!\nЗащита от дрейфа идеологии: §G+15%§!\nСкорость исследований: §R-1%§!"

 ADISCORD_state_development_1_tt: "§YРассыпающийся аппарат§!\nПриказы игнорируются, коррупция доминирует, налоги собираются плохо, политика не исполняется.\n\n§YЭффекты:§!\nПрирост политической власти: §R-0.10§!\nФактор фабрик на товары народного потребления: §R+4%§!\nСкорость строительства: §R-5%§!"
 ADISCORD_state_development_2_tt: "§YБумажное государство§!\nМинистерства и процедуры существуют, но аппарат слаб, фрагментирован и зависим от неформальных сетей.\n\n§YЭффекты:§!\nПрирост политической власти: §R-0.05§!\nФактор фабрик на товары народного потребления: §R+2%§!"
 ADISCORD_state_development_3_tt: "§YФункционирующее государство§!\nБюрократия, сбор налогов, правоохранительная система и администрация работают на базовом уровне.\n\n§YЭффекты:§!\nПрирост политической власти: §G+0.02§!\nСкорость строительства: §G+2%§!"
 ADISCORD_state_development_4_tt: "§YЭффективная администрация§!\nДисциплинированная бюрократия и сильная способность к реализации решений ускоряют реформы.\n\n§YЭффекты:§!\nПрирост политической власти: §G+0.06§!\nФактор фабрик на товары народного потребления: §G-2%§!\nСкорость строительства: §G+4%§!"
 ADISCORD_state_development_5_tt: "§YМашина управления§!\nГосударственный аппарат способен быстро координировать и глубоко контролировать национальные ресурсы.\n\n§YЭффекты:§!\nПрирост политической власти: §G+0.10§!\nФактор фабрик на товары народного потребления: §G-3%§!\nСкорость строительства: §G+6%§!\nСтабильность: §R-1%§!"

 ADISCORD_economic_development_1_tt: "§YРазрушенная экономика§!\nПроизводственные цепочки разорваны, рынки не доверяют государству, а хозяйство держится на случайных сделках.\n\n§YЭффекты:§!\nФактор фабрик на товары народного потребления: §R+5%§!\nСкорость строительства: §R-8%§!\nПроизводительность заводов: §R-5%§!"
 ADISCORD_economic_development_2_tt: "§YХрупкая экономика§!\nЭкономика работает, но слишком зависит от отдельных портов, посредников, сырья или политических связей.\n\n§YЭффекты:§!\nФактор фабрик на товары народного потребления: §R+2%§!\nСкорость строительства: §R-3%§!"
 ADISCORD_economic_development_3_tt: "§YФункционирующая экономика§!\nРабочие рынки, базовая промышленность, услуги и понятная финансовая среда позволяют стране нормально жить.\n\n§YЭффекты:§!\nСкорость строительства: §G+2%§!\nПроизводительность заводов: §G+2%§!"
 ADISCORD_economic_development_4_tt: "§YРазвитая экономика§!\nУстойчивая промышленность, качественные услуги и предсказуемые рынки поддерживают сложные проекты.\n\n§YЭффекты:§!\nФактор фабрик на товары народного потребления: §G-1%§!\nСкорость строительства: §G+4%§!\nПроизводительность заводов: §G+4%§!"
 ADISCORD_economic_development_5_tt: "§YИнтегрированная экономика§!\nПроизводство, финансы, торговля и инфраструктура связаны в мощную систему роста и мобилизации.\n\n§YЭффекты:§!\nФактор фабрик на товары народного потребления: §G-2%§!\nСкорость строительства: §G+6%§!\nПроизводительность заводов: §G+6%§!\nСкорость исследований: §G+2%§!"
